# ============================================================
# 徐振伟智能体 — 50条AI独学TIPS（来源：《AI独学超大全》）
# 按原书4章结构组织：超具体化(25) + 输出深化(15) + 机制化(10)
# ============================================================

tips:

  # ==========================================
  # 第1-2章：超具体化 — 基础AI应用 (TIPS 01-25)
  # ==========================================

  - id: "TIPS-01"
    name: "理清杂乱无章的思绪"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "通过与AI对话，将大脑中凌乱的任务和烦恼进行客观的梳理与分级"
    stepCount: 1
    steps:
      - name: "头脑整理"
        prompt: |
          你是一位专业的思维整理教练。请帮我整理当前混乱的思绪。

          我会把我脑中所有的待办事项、担忧、灵感和困惑全部倾倒给你。请完成：

          1. **分类整理**：把我说的一切分成「紧急重要」「重要不紧急」「可以委托」「可以放弃」四类
          2. **优先级排序**：告诉我今天应该集中精力做的 3 件事是什么
          3. **一句话总结**：用一句话概括我当前最核心的关注点

          格式要求：
          - 每类下面用简洁的要点列表
          - 不要评价我的混乱程度，只帮我理清
          - 语气温和但专业，像一位值得信赖的顾问

          以下是我当前脑中所有的内容：
          {topic}

  - id: "TIPS-02"
    name: "长篇网页摘要（提升时间效率）"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "让AI在数秒内提取长篇文章的核心观点，省去阅读全文的劳顿"
    stepCount: 1
    steps:
      - name: "快速摘要"
        prompt: |
          你是一位高效的信息分析师。请对以下文章内容进行快速摘要：

          {topic}

          要求：
          1. **一句话结论**（用 > 引用格式）
          2. **3个核心要点**（每个不超过2行）
          3. **值得深读吗？**（1-10分，给出理由）
          4. **可执行的行动建议**（如果有的话）

          如果原文很长，优先提取与"决策"相关的信息。不要复述原文，只给干货。

  - id: "TIPS-03"
    name: "自动化每日新闻查阅"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "设定特定关键词和目的，由AI自动筛选并生成个性化的新闻日报"
    stepCount: 1
    steps:
      - name: "新闻简报"
        prompt: |
          你是一位专属行业研究员。请基于你的知识库，围绕以下主题生成一份新闻简报：

          关注领域：{topic}

          要求：
          1. **过去一周最重要的 5 条相关动态**（每条：标题 + 1句话影响分析）
          2. **值得关注的趋势信号**（2-3个正在发生的底层变化）
          3. **你的建议**：基于这些新闻，我应该关注什么？采取什么行动？

          注意：
          - 请基于你训练数据中最新的相关信息
          - 标注每条信息的可信度（高/中/低）
          - 如果信息可能过时，请明确说明

  - id: "TIPS-04"
    name: "让AI成为会议纪要撰写大师"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "将会议内容交给AI，5分钟内生成包含结论、行动项的精简纪要"
    stepCount: 1
    steps:
      - name: "撰写纪要"
        prompt: |
          你是一位专业的会议记录官。请根据以下会议内容，生成标准格式的会议纪要：

          会议内容：{topic}

          请按以下格式输出：
          ### 会议纪要
          - **目的**：[一句话]
          - **结论**：[会议达成的核心决定]
          - **决定事项**：
            1. [决定1]
            2. [决定2]
          - **行动项**：
            | 任务 | 负责人 | 截止日 |
            |------|--------|--------|
          - **下次议题**：[预告]

          额外要求：
          - 客观记录，不掺杂个人判断
          - 如果有争议但未解决的议题，单独列出
          - 最后附一段可用于邮件发送的精简版（3-5句话）

  - id: "TIPS-05"
    name: "跨应用信息检索"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "利用AI的横向检索能力，跨应用查找并汇总特定项目的相关信息"
    stepCount: 1
    steps:
      - name: "信息汇总"
        prompt: |
          你是一位信息整合专家。关于以下主题，请帮我汇总所有相关信息：

          查询主题：{topic}

          请完成：
          1. **全面检索**：从你知识库中检索所有与该主题相关的信息片段
          2. **信息归类**：按「关键事实」「人物/组织」「时间节点」「相关链接」分类
          3. **整合报告**：生成一份结构化的信息汇总报告

          要求：
          - 不遗漏任何可能相关的信息
          - 标注信息来源的可靠性
          - 如果信息之间有矛盾，明确指出

  - id: "TIPS-06"
    name: "通过AI批改克服文档写作恐惧"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "AI针对草稿提供具体的遣词造句、结构和语气修正建议"
    stepCount: 1
    steps:
      - name: "文档批改"
        prompt: |
          你是一位温和但专业的写作教练。请帮我改进以下文档：

          {topic}

          请从以下维度给出修改建议：
          1. **结构**：逻辑顺序是否合理？是否需要调整段落顺序？
          2. **表达**：哪些句子可以更简洁？哪些地方需要更具体的例子？
          3. **语气**：是否符合目标读者的期待？太正式还是太随意？
          4. **亮点**：这个文档写得最好的部分是哪里？为什么？

          重要原则：
          - 先肯定再建议（"这个开头很有吸引力，如果...会更好"）
          - 不要重写整个文档，只标记关键改进点
          - 如果原文本身很好，就告诉用户"已经很好"，不要硬找问题

  - id: "TIPS-07"
    name: "专业术语转化为易懂语言"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "AI充当翻译官，将充斥着行话的文案改写为非专业人士能懂的内容"
    stepCount: 1
    steps:
      - name: "术语翻译"
        prompt: |
          你是一位擅长"翻译"的沟通专家。请把以下专业内容转化为通俗语言：

          原始内容：{topic}

          要求：
          1. **目标读者**：完全不了解这个领域的普通人
          2. **方法**：用类比和生活中的例子来解释专业概念
          3. **检验标准**：读完之后，一个初中生应该能复述核心意思
          4. **保留准确度**：通俗 ≠ 不准确，关键信息不能丢失

          输出格式：
          > 一句话大白话版（最简洁的版本）
          ### 通俗解释
          [2-3段，用类比说明]
          ### 关键术语对照表
          | 专业术语 | 通俗解释 |
          |---------|---------|

  - id: "TIPS-08"
    name: "Word瞬间转PPT"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "中级"
    description: "AI分析文档结构，自动生成幻灯片大纲、摘要以及演讲者备注"
    stepCount: 1
    steps:
      - name: "生成PPT大纲"
        prompt: |
          你是一位演示设计专家。请把以下文档内容转化为PPT演示大纲：

          文档内容：{topic}

          要求：
          1. **幻灯片数量**：8-12页（根据内容量调整）
          2. **每页结构**：
             - 标题（吸引人，不超过10字）
             - 核心要点（3-5个bullet point）
             - 演讲者备注（这一页该怎么讲，语气建议）
          3. **叙事弧线**：
             - 第1页：Hook（抓注意力的问题/数据/故事）
             - 中间页：Problem → Solution → Evidence
             - 最后页：Call to Action
          4. **设计建议**：每页标注适合用什么类型的图表或配图

  - id: "TIPS-09"
    name: "AI生成PPT插图提升资料易懂度"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "中级"
    description: "将抽象的逻辑关系或概念转化为直观的视觉图形和配图描述"
    stepCount: 1
    steps:
      - name: "图解生成"
        prompt: |
          你是一位信息可视化设计师。请为以下内容设计图示方案：

          内容：{topic}

          请提供：
          1. **核心概念图**：描述一张能概括全部内容的图示（用什么图表类型、怎么布局、配什么颜色）
          2. **流程图/关系图**：如果有流程或因果关系，画出文字版流程图
          ```
          [步骤1] → [步骤2] → [步骤3]
             ↓          ↓
          [分支A]   [分支B]
          ```
          3. **对比表**：如果涉及对比，给出对比表格
          4. **PPT制作建议**：用PowerPoint自带的SmartArt或形状就能实现的具体方法

  - id: "TIPS-10"
    name: "移动中灵感→结构化笔记"
    category: "AI独学-超具体化"
    chapter: 1
    difficulty: "初级"
    description: "通过语音输入将零散的想法转化为逻辑清晰、包含下一步行动的备忘录"
    stepCount: 1
    steps:
      - name: "结构化笔记"
        prompt: |
          你是一位个人知识管理助手。我把刚才想到的零散想法告诉你，请帮我整理成结构化笔记：

          原始想法：{topic}

          请生成：
          ### 📝 结构化笔记
          - **核心概念**（用一句话概括这个灵感的本质）
          - **背景/为什么想到**（这个灵感是怎么冒出来的）
          - **关键要素**（这个想法包含哪些组成部分）
          - **与已有知识的关联**（这个想法跟什么领域/概念有关）
          - **下一步行动**（如果要推进这个想法，明天可以做什么？）
          - **标签**：#关键词1 #关键词2 #关键词3

          原则：保留原始灵感的"新鲜感"，不要过度修饰让它变得平庸。

  - id: "TIPS-11"
    name: "AI陪练激发创新灵感"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "初级"
    description: "AI通过提供多维度的提问和视角，帮助用户突破思维定式，完善策划"
    stepCount: 1
    steps:
      - name: "壁打ち陪练"
        prompt: |
          你是一位创新思维教练。我要跟你进行"壁打ち"（日语：对着墙练习）——把我的想法抛给你，你来给我反馈和提问。

          我的想法/课题：{topic}

          请完成以下陪练流程：
          1. **复述理解**：先用自己的话复述一遍我的想法，确认你理解了
          2. **挑战性问题**（至少5个）：
             - 从不同角度挑战我的假设
             - 问题要有冲击力，让我停下来思考
             - 例如："如果反过来做会怎样？""最坏的情况是什么？"
          3. **新视角建议**：从我没考虑过的维度给我2-3个新方向
          4. **一句话总结**：你认为这个想法最大的潜力在哪里？

  - id: "TIPS-12"
    name: "Copilot笔记本模式深化思考"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "在超长上下文窗口中输入大量背景资料，获取极具洞察力的分析建议"
    stepCount: 1
    steps:
      - name: "深度分析"
        prompt: |
          你是一位深度分析专家。我会给你大量背景资料，请你进行系统性分析：

          背景资料：{topic}

          请按照以下框架进行分析：
          ### 一、现状全景
          - 当前状态的一句话概括
          - 关键参与者和他们的立场

          ### 二、深层结构
          - 表面的问题 vs 深层的原因
          - 各方利益格局分析
          - 隐藏的矛盾和张力

          ### 三、关键洞察
          - 3个最重要的发现
          - 别人可能忽略的盲点

          ### 四、行动建议
          - 短期（1周内）：2个可以立即启动的行动
          - 中期（1-3个月）：需要布局的方向
          - 长期（1年+）：战略层面的建议

          要求：基于资料本身分析，不要过度延伸推测。

  - id: "TIPS-13"
    name: "学习经历→作品集网站"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "AI协助整理散乱的经历和技能，自动生成具有说服力的故事化个人网页"
    stepCount: 1
    steps:
      - name: "生成作品集"
        prompt: |
          你是一位个人品牌策划师。请根据我的经历和技能，帮我设计一个个人作品集（Portfolio）：

          我的背景：{topic}

          请生成：
          ### 个人品牌定位
          - **一句话定位**（别人看到这句话就知道你是做什么的）
          - **核心标签**（3-5个关键词）

          ### 故事化经历
          - 不要按时间罗列，而是串成一个有起伏的成长故事
          - 每个阶段标注：挑战 → 行动 → 成果

          ### 作品/项目展示
          | 项目名称 | 解决了什么问题 | 我的角色 | 成果（用数字说话） |
          |---------|--------------|---------|------------------|

          ### 能力雷达图（文字版）
          - 列出5-6项核心能力，每项用 ⭐ 标注水平（1-5星）

  - id: "TIPS-14"
    name: "AI生涯设计师定制学习计划"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "根据终极目标和个人兴趣，由AI量身定制从基础到实战的学习路线图"
    stepCount: 1
    steps:
      - name: "定制学习路线"
        prompt: |
          你是一位职业生涯规划师 + 学习路径设计师。请根据以下信息，为我定制学习计划：

          我的目标和背景：{topic}

          请设计：
          ### 终极目标画像
          - 3年后你想成为什么样的人？（具体化描述）

          ### 技能差距分析
          | 需要的技能 | 现有水平(1-10) | 目标水平(1-10) | 差距 |
          |-----------|---------------|---------------|------|

          ### 学习路线图（分4个阶段）
          - **Phase 1 基础期**（1-3个月）：学什么？用什么资源？产出什么？
          - **Phase 2 进阶期**（4-6个月）：学什么？做什么项目？
          - **Phase 3 实战期**（7-12个月）：怎么用学到的技能创造价值？
          - **Phase 4 精进期**（第2-3年）：怎么成为专家？

          ### 月度里程碑
          每个月结束时应该达到什么水平？怎么检验？

  - id: "TIPS-15"
    name: "全自动倒推任务分解(WBS)"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "AI将宏大目标分解为月、周、日单位的WBS（工作分解结构）"
    stepCount: 1
    steps:
      - name: "WBS分解"
        prompt: |
          你是一位项目管理专家，擅长WBS（工作分解结构）。请把我的目标拆解为可执行的行动计划：

          我的目标：{topic}

          请生成：
          ### 目标定义
          - 一句话描述目标
          - 成功标准（SMART原则：具体的、可衡量的、可达成的、相关的、有时间限制的）

          ### WBS分解
          按以下层级展开：
          ```
          目标
          ├── 阶段1: [名称] (第1-X月)
          │   ├── 任务1.1: [具体任务]
          │   │   ├── 1.1.1 [本周做什么]
          │   │   └── 1.1.2 [下周做什么]
          │   └── 任务1.2: ...
          ├── 阶段2: [名称] (第X-Y月)
          ...
          ```

          ### 每周行动清单（前4周）
          | 周次 | 核心任务 | 预计耗时 | 完成标志 |
          |------|---------|---------|---------|

  - id: "TIPS-16"
    name: "预测学习绊脚石防半途而废"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "初级"
    description: "让AI扮演资深导师，提前指出初学者易犯错的难点并提供对策"
    stepCount: 1
    steps:
      - name: "预测障碍"
        prompt: |
          你是一位经验丰富的导师，带过很多初学者。关于以下学习目标，请帮我提前预判困难：

          我要学习/做的事情：{topic}

          请列出：
          ### Top 5 常见绊脚石
          | # | 什么样的人会在哪里卡住 | 为什么会卡住 | 怎么跨过去 |
          |---|---------------------|------------|-----------|

          ### 放弃高危期
          - 初学者最容易在哪个阶段放弃？（第几天/第几周/第几个月）
          - 放弃的典型心理活动是什么？
          - 怎么给自己打"预防针"？

          ### 防放弃策略
          - 3个保持动力的具体方法
          - 如果今天只做一件事，做什么最能防止放弃？

  - id: "TIPS-17"
    name: "学习风格诊断定制策略"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "初级"
    description: "分析个人性格和过往经验，匹配视觉、听觉或逻辑等最高效的学习风格"
    stepCount: 1
    steps:
      - name: "风格诊断"
        prompt: |
          你是一位教育心理学家，擅长学习风格诊断。请根据以下信息帮用户分析最适合的学习策略：

          关于我：{topic}

          请完成：
          ### 学习风格诊断
          分析以下维度的倾向性：
          | 维度 | 你的倾向 | 推荐的学习方式 |
          |------|---------|--------------|
          | 视觉 vs 听觉 | | |
          | 逻辑 vs 直觉 | | |
          | 独自 vs 社交 | | |
          | 结构化 vs 自由探索 | | |
          | 理论优先 vs 实践优先 | | |

          ### 定制化学习建议
          - 最适合你的 3 种学习方法
          - 哪些"流行"的学习方法可能不适合你（并说明为什么）

          ### 避坑指南
          基于你的风格，最容易犯的 2 个学习误区

  - id: "TIPS-18"
    name: "从情感波动发现黄金时间"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "通过记录专注力波动并让AI分析，找出最适合高强度工作的时间段"
    stepCount: 1
    steps:
      - name: "发现黄金时间"
        prompt: |
          你是一位时间管理和生物节律分析专家。关于我的工作和生活节奏，帮我分析：

          我的情况：{topic}

          请分析：
          ### 生物节律评估
          根据你描述的工作/学习状态，推断你的：
          - **黄金时间**（什么时候思维最清晰？适合做什么？）
          - **创造力高峰**（什么时候灵感最活跃？）
          - **低谷期**（什么时候容易走神？适合做什么？）

          ### 时间重组建议
          | 时间段 | 精力水平 | 推荐任务类型 | 具体建议 |
          |--------|---------|------------|---------|
          | 早晨 | | | |
          | 上午 | | | |
          | 下午 | | | |
          | 晚上 | | | |

          ### 习惯优化
          - 3个简单的日常调整，帮助你最大化黄金时间
          - 如何保护你的深度工作时间不被干扰？

  - id: "TIPS-19"
    name: "召唤计时员AI保持专注"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "初级"
    description: "AI不仅是闹钟，更是温和的提醒者，协助在不同任务间进行顺滑切换"
    stepCount: 1
    steps:
      - name: "专注力管理"
        prompt: |
          你是一位专注力教练。我今天要做以下事情，请帮我制定一份时间管理计划：

          今天要做的事：{topic}

          请生成：
          ### 今日时间块规划
          | 时间块 | 任务 | 预计耗时 | 番茄钟数 | 优先级 |
          |--------|------|---------|---------|--------|

          ### Pomodoro番茄钟设置
          推荐使用 __ 分钟专注 + __ 分钟休息的节奏（根据任务复杂度调整）

          ### 防分心策略
          - 最可能打断我的 3 件事是什么？
          - 针对每个打断的应对策略

          ### 任务切换提示
          - 完成一个任务后，怎么平滑切换到下一个？
          - 如果某个任务超时了怎么办？

  - id: "TIPS-20"
    name: "专业书→专属有声书"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "将艰深枯涩的专业内容改写为浅显易懂的故事剧本，利用碎片时间收听"
    stepCount: 1
    steps:
      - name: "转化为有声书"
        prompt: |
          你是一位知识科普作家，擅长把难懂的专业内容变成引人入胜的故事。请把以下专业内容转化为"有声书剧本"：

          原始内容：{topic}

          要求：
          ### 改写原则
          1. **降低难度**：用小学六年级能理解的语言
          2. **故事化**：把抽象概念变成具体的人物和场景
          3. **节奏感**：短句为主，适合朗读（每句不超过25字）
          4. **标记重点**：用【重读】标记需要强调的关键概念

          ### 输出格式
          ```
          【开场白】(15秒吸引注意力)
          ...（用问题或惊人的事实开场）

          【核心内容】(分3-4个小节)
          小节1: [标题]
          ...（具体内容，用对话体或故事体）

          小节2: [标题]
          ...

          【总结回顾】(30秒)
          ...（用"我们今天学到了..."的方式总结3个要点）

          【行动号召】
          ...（听完之后具体该做什么）
          ```

  - id: "TIPS-21"
    name: "YouTube视频→文本教材"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "AI将长视频自动转化为带时间戳的笔记、关键点列表及行动建议"
    stepCount: 1
    steps:
      - name: "视频内容萃取"
        prompt: |
          你是一位学习笔记专家。请把以下视频内容转化为高质量的文本学习材料：

          视频内容：{topic}

          请生成：
          ### 📋 视频学习卡片
          - **一句话总结**
          - **5个关键点**（每条带简要解释）

          ### ⏱ 带时间戳的详细笔记
          | 时间段 | 主题 | 核心内容 | 我的思考/疑问 |
          |--------|------|---------|-------------|

          ### 🎯 可执行的行动建议
          看完这个视频后，你应该做的 3 件事

          ### 🔗 延伸学习
          如果对这个话题感兴趣，还可以看什么/读什么？

  - id: "TIPS-22"
    name: "提取难懂文献要点"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "AI通过特定论文框架快速结构化难懂的学术文章"
    stepCount: 1
    steps:
      - name: "文献精读"
        prompt: |
          你是一位学术研究助手。请用以下框架帮我快速理解这篇文献：

          文献内容：{topic}

          请按学术论文标准格式提取：
          ### 论文速读卡
          - **标题**（如能识别）
          - **作者/机构**（如能识别）

          ### 核心内容
          - **研究背景**（为什么要做这个研究？）
          - **研究目的/问题**（要解决什么？）
          - **方法**（怎么做的？）
          - **主要发现**（最重要的3个结果）
          - **结论与启示**（所以呢？对我们有什么意义？）

          ### 批判性阅读
          - 这个研究的局限性是什么？
          - 研究方法有没有问题？
          - 结论能不能推广到其他场景？

          ### 与你的关联
          - 这些发现对你的工作/学习有什么具体帮助？

  - id: "TIPS-23"
    name: "NotebookLM私有知识库高效学习"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "初级"
    description: "建立基于私有文档的知识库，让AI扮演专属家庭教师解答相关疑问"
    stepCount: 1
    steps:
      - name: "知识库问答"
        prompt: |
          你是一位知识管理顾问。关于以下学习资料，请帮我建立理解和记忆：

          学习资料内容：{topic}

          请完成：
          1. **整体框架**：先画一个知识地图（用文字描述各部分之间的关系）
          2. **核心概念清单**：列出所有需要理解的关键概念
          3. **概念之间的关系**：哪些概念之间有因果关系？哪些是对比关系？
          4. **自测问题**（5个）：
             - 如果我答不上来，说明我还没理解
             - 包含你的参考答案
          5. **记忆辅助**：
             - 给每个核心概念配一个记忆口诀或联想画面

  - id: "TIPS-24"
    name: "个性化习题集填补知识漏洞"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "AI根据用户当前理解水平，自动生成难度适中的个性化习题"
    stepCount: 1
    steps:
      - name: "生成习题"
        prompt: |
          你是一位自适应学习系统。请根据以下内容为我生成练习题：

          学习主题：{topic}

          请生成 3 个难度级别的题目：

          ### 🟢 基础题（3题：检验是否记住了关键概念）
          - 填空题或判断题
          - 附答案和解析

          ### 🟡 应用题（2题：检验是否会运用）
          - 情景题：给一个具体场景，问你怎么用学到的知识解决
          - 附参考答案和评分标准

          ### 🔴 挑战题（1题：检验是否能融会贯通）
          - 开放题：综合多个知识点，没有标准答案
          - 附思考框架和评估维度

          难度校准原则：
          - 基础题：答对80%就过关
          - 应用题：答对60%就继续
          - 挑战题：能说出一半就算优秀

  - id: "TIPS-25"
    name: "自动分析真题推导合格最短路径"
    category: "AI独学-超具体化"
    chapter: 2
    difficulty: "中级"
    description: "分析真题的出题频率和配分，明确必须做的和可以舍弃的部分"
    stepCount: 1
    steps:
      - name: "考试策略分析"
        prompt: |
          你是一位考试策略专家。请帮我做一次"取舍分析"：

          考试/认证目标：{topic}

          请分析：
          ### 分数分布分析
          | 知识模块 | 预估分值占比 | 我目前的掌握度(1-10) | 投入产出比 | 策略 |
          |---------|------------|-------------------|-----------|------|
          | | | | | 集中火力/保持/舍弃 |

          ### 高频考点 Top 5
          1. [考点] — 预计出题概率 __%，建议投入 __% 时间
          ...

          ### 舍弃清单
          哪些内容"主动放弃不学"？理由是什么？（分值低+难度高+时间不够）

          ### 最短路径策略
          - 如果只剩 1 周：做什么？
          - 如果只剩 3 天：做什么？
          - 如果只剩 1 天：背什么？

  # ==========================================
  # 第3章：输出深化 — 深度学习与产出 (TIPS 26-40)
  # ==========================================

  - id: "TIPS-26"
    name: "晚间5分钟AI对话巩固学习"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "初级"
    description: "通过AI的追问促使自我复述，利用费曼技巧将短期记忆转化为长期记忆"
    stepCount: 1
    steps:
      - name: "费曼复述"
        prompt: |
          你是一位善于引导的学习伙伴。今天学了以下内容，请帮我用"费曼技巧"巩固：

          今天学的内容：{topic}

          费曼技巧的4步流程：

          **第1步：让我复述**
          请我用自己的话解释今天学到的核心概念（我会在下面输入）

          **第2步：找出盲区**
          听完我的复述后，请指出：
          - 哪里我解释得不够清楚？
          - 哪里我用了专业术语但没有真正理解？
          - 哪个概念我似乎跳过了？

          **第3步：简化再简化**
          请帮我把最难的概念，用一个"小学生也能懂"的类比重新解释

          **第4步：巩固问题**
          给我 3 个需要综合理解才能回答的问题（不是简单回忆）

          注意：语气要像学习伙伴，不要像老师在考试。

  - id: "TIPS-27"
    name: "与自己分身对话内化知识"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "让AI模仿自己的语调，通过向特定对象模拟讲解来检验理解度"
    stepCount: 1
    steps:
      - name: "分身对话"
        prompt: |
          你要扮演"另一个我"——模仿我的思维方式和表达习惯。现在我要向你（另一个我）讲解今天学到的东西，你来追问和挑战我。

          我今天学的内容：{topic}

          流程：
          1. 我先向你讲解（我会在后续消息中发送）
          2. 听完后，你要从"我自己的视角"追问：
             - "等等，这个概念我好像没完全懂，你能用另一种方式再说一遍吗？"
             - "如果把这个应用到[我的某个实际场景]，会怎样？"
             - "这个跟我之前学的[相关内容]有什么关系？"
          3. 最后告诉我："听完你的讲解，我觉得你最深刻的理解是___，还需要加强的是___"

          注意：
          - 语气要自然，像我跟自己说话
          - 追问要有针对性，不要模板化

  - id: "TIPS-28"
    name: "AI外教角色扮演练口语"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "初级"
    description: "设定具体的商务场景进行24小时随时随地的模拟对话练习"
    stepCount: 1
    steps:
      - name: "角色扮演"
        prompt: |
          你要扮演一位专业的外语对话教练。请根据以下场景，跟我进行模拟对话：

          练习场景：{topic}

          流程：
          1. **场景设定**：先描述这个对话场景的背景（谁、在哪、要谈什么）
          2. **分阶段练习**：
             - Round 1：你先说一句开场白，我回应
             - Round 2：你根据我的回答继续对话，并在我卡住时给提示词
             - Round 3：完成对话后，你给我反馈
          3. **反馈内容**：
             - 哪些表达很地道？（表扬）
             - 哪些地方可以换个说法？（给出 2-3 个更地道的替代表达）
             - 语法或发音注意点（如果适用）

          要求：
          - 不要一次说太多，等我回应再继续
          - 反馈要具体，不要泛泛的"不错/继续加油"

  - id: "TIPS-29"
    name: "AI撰写商务英文"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "AI考虑文化背景差异，修正直译式英语，提供更得体、专业的替代方案"
    stepCount: 1
    steps:
      - name: "商务英文润色"
        prompt: |
          你是一位跨文化商务沟通专家。请帮我把以下内容转化为得体的商务英文：

          原始内容/需求：{topic}

          请提供：
          ### 润色后的版本
          - 直接给出修改后的完整文本

          ### 修改说明
          | 原文（或直译） | 修改后 | 为什么这样改 |
          |--------------|--------|------------|
          | ... | ... | （文化/语气/商务惯例原因） |

          ### 文化注意点
          - 这个场景下，英美商务沟通有什么特别的习惯？
          - 什么表达可能冒犯到对方？（哪怕是无意的）

          ### 备选版本
          - 更正式版（如果对方是高管）
          - 更亲切版（如果对方是熟悉的合作伙伴）

  - id: "TIPS-30"
    name: "夸奖型AI教练科学维持动力"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "初级"
    description: "利用积极心理学原理，让AI对微小进步给予即时肯定，建立正向反馈循环"
    stepCount: 1
    steps:
      - name: "动力教练"
        prompt: |
          你是一位基于积极心理学的动力教练。我今天做了以下事情（可能不多），请帮我保持动力：

          我的进展：{topic}

          请完成：
          1. **真心夸奖**（不是敷衍的"很棒"，而是具体指出哪个动作值得肯定）
             - "我注意到你___，这个其实很不容易，因为___"
          2. **进步可视化**：
             - "跟上周/昨天相比，你在___方面进步了___"
             - 即使进步很小，也指出来
          3. **小胜利清单**：
             - 今天你达成了哪 3 个"微小的胜利"？（哪怕只是"打开书了"也算）
          4. **明天的小目标**：
             - 只定 1 个明天一定能完成的小目标
             - 小到不可能失败的程度

          原则：
          - 真诚 > 夸张
          - 具体 > 泛泛
          - 关注过程 > 关注结果

  - id: "TIPS-31"
    name: "自动颁发数字奖状"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "初级"
    description: "当达成阶段性目标时，由AI生成充满仪式感的奖状和赞美语"
    stepCount: 1
    steps:
      - name: "颁发奖状"
        prompt: |
          你是一位仪式感设计师。我达成了一个阶段性目标，请为我颁发一张"数字奖状"：

          我的成就：{topic}

          请生成：
          ```
          ╔══════════════════════════════════╗
          ║     🏆  成 就 解 锁  🏆         ║
          ║                                  ║
          ║   [成就名称 - 用吸引人的标题]    ║
          ║                                  ║
          ║   授予：[你的名字]               ║
          ║   成就：[具体描述完成了什么]      ║
          ║   日期：[今天]                   ║
          ║                                  ║
          ║   "一段有力量的评价语录"        ║
          ║                                  ║
          ║   获得技能：🔓 [技能名] Lv+1     ║
          ║   下一挑战：[下一个目标预告]      ║
          ║                                  ║
          ╚══════════════════════════════════╝
          ```

          然后把这张"奖状"解读成：
          - 你在这个成就中展现出的 3 个优秀特质
          - 这个成就为你打开的新可能性

  - id: "TIPS-32"
    name: "游戏化学习进度"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "将学习行为量化为经验值（XP），通过等级提升和称号获得来增加趣味性"
    stepCount: 1
    steps:
      - name: "游戏化设计"
        prompt: |
          你是一位游戏化（Gamification）设计师。请把我的学习目标设计成一个RPG游戏系统：

          学习目标：{topic}

          请设计：
          ### 🎮 角色设定
          - **职业**：[根据学习目标起一个有趣的职业名]
          - **当前等级**：Lv.1
          - **经验值系统**：
            | 行为 | 获得XP | 每日上限 |
            |------|--------|---------|
            | 学习1小时 | +100 XP | |
            | 完成练习题 | +50 XP | |
            | 教会别人一个概念 | +200 XP | |
            | 连续打卡7天 | +500 XP（连击奖励） | |

          ### 🏅 成就系统
          | 称号 | 解锁条件 | 效果加成 |
          |------|---------|---------|
          | 初学者 | 累计100 XP | |
          | 勤奋学习家 | 连续打卡14天 | |
          | ... | ... | |

          ### ⚔️ Boss战
          - **第一个Boss**：[什么水平的挑战]
          - **Boss掉落**：[完成后获得什么奖励]

  - id: "TIPS-33"
    name: "自动生成周报快速PDCA循环"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "AI基于一周记录分析效率高低，提出针对性的改进方案"
    stepCount: 1
    steps:
      - name: "学习PDCA"
        prompt: |
          你是一位学习数据分析师。请根据我的一周学习记录，做一次PDCA分析：

          本周记录：{topic}

          请生成：
          ### 📊 本周学习报告

          **Plan（计划 vs 实际）**
          | 计划 | 实际完成 | 完成率 | 偏差原因 |
          |------|---------|--------|---------|

          **Do（执行记录）**
          - 总学习时间：__ 小时
          - 效率最高的一天/时段：
          - 效率最低的一天/时段：

          **Check（分析诊断）**
          - 哪些学习方法有效？（有数据支撑）
          - 哪些时间被浪费了？
          - 最大的效率杀手是什么？

          **Action（改进方案）**
          - 下周的 3 个具体调整（不是"更努力"，而是"换个方法"）
          - 下周的核心目标（只定1个）

  - id: "TIPS-34"
    name: "AI社群经理协同成长"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "高级"
    description: "由AI寻找学习同伴、制定社群规则并充当讨论协调人"
    stepCount: 1
    steps:
      - name: "社群设计"
        prompt: |
          你是一位社群运营专家。我想围绕以下主题建立一个学习社群，请帮我设计：

          社群主题：{topic}

          请设计：
          ### 社群定位
          - **社群名称**（吸引人的）
          - **一句话宣言**
          - **目标人群画像**（谁会加入？他们想要什么？）

          ### 社群规则
          - 3条核心规则（简洁有力）
          - 入群门槛（要不要筛选？怎么筛选？）

          ### 活动设计
          | 活动类型 | 频率 | 形式 | 预期效果 |
          |---------|------|------|---------|
          | | | | |

          ### 角色分工
          - 我需要扮演什么角色？
          - AI可以协助做什么？（自动欢迎新人/话题推荐/讨论总结）
          - 需要招募什么类型的核心成员？

  - id: "TIPS-35"
    name: "概念图鸟瞰思考全景"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "将碎片化的市场、竞争、技术等要素转化为清晰的二维关系图"
    stepCount: 1
    steps:
      - name: "制作概念图"
        prompt: |
          你是一位战略咨询顾问，擅长用概念图（Concept Map）理清复杂局面。请帮我把以下信息整理成概念图：

          原始信息：{topic}

          请生成：
          ### 概念图（文字版）
          用层级缩进展示各个概念之间的关系：
          ```
          核心主题
          ├── 维度1: [名称]
          │   ├── 子概念A —[导致]→ 子概念B
          │   └── 子概念C —[抑制]→ 子概念D
          ├── 维度2: [名称]
          │   └── ...
          └── 维度3: [名称]
              └── ...
          ```

          ### 关系说明
          | 概念对 | 关系类型 | 说明 |
          |--------|---------|------|
          | A → B | 因果关系 | A的增加导致B的... |

          ### 关键洞察
          从这个概念图中能看出什么别人可能忽略的联系？

  - id: "TIPS-36"
    name: "深度研究深挖特定课题"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "高级"
    description: "AI多角度自动检索、分析并整合网络信息，生成系统性的深度报告"
    stepCount: 1
    steps:
      - name: "深度研究"
        prompt: |
          你是一位资深行业研究员。请就以下主题做一次"桌面研究"（Desk Research）：

          研究课题：{topic}

          请产出：
          ### 深度研究报告

          **1. 行业全景**
          - 市场规模与增长率（如果有数据）
          - 关键参与者地图
          - 价值链分析

          **2. 趋势与驱动因素**
          - 3个最重要的趋势
          - 每个趋势的驱动因素和阻力
          - 趋势之间的相互作用

          **3. 机会与风险**
          - 3个最值得关注的机会窗口
          - 3个最大的风险因素
          - 机会×风险矩阵分析

          **4. 行动建议**
          - 如果是大企业，应该怎么做？
          - 如果是创业公司，应该怎么做？
          - 如果是个人从业者，应该怎么做？

          要求：
          - 基于知识库中的真实信息
          - 明确区分"事实"和"推测"
          - 不确定的地方标注"待验证"

  - id: "TIPS-37"
    name: "多新闻对比可视化事实观点"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "AI客观拆解不同立场的报道，剥离潜在偏见，提取确定性的事实"
    stepCount: 1
    steps:
      - name: "新闻对比分析"
        prompt: |
          你是一位媒体分析专家，擅长从多角度报道中剥离事实。请分析以下议题的多方报道：

          议题：{topic}

          请生成：
          ### 事实与观点分离

          **确定的事实**（各方一致认可的部分）
          - 事实1：[来源A确认 + 来源B确认]
          - 事实2：...

          **观点分歧**（各方说法不一）
          | 立场A的观点 | 立场B的观点 | 分歧原因分析 |
          |------------|------------|------------|

          **潜在偏见识别**
          - 各方报道可能隐藏的预设立场
          - 用了什么修辞手法来引导读者情绪？

          **你的客观判断**
          - 基于以上分析，最接近真相的叙述是什么？
          - 还需要什么信息才能做出更准确的判断？

  - id: "TIPS-38"
    name: "思维链(CoT)获取高精度回答"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "通过Step by Step指令让AI展示逻辑推导过程，提升输出质量"
    stepCount: 1
    steps:
      - name: "思维链推理"
        prompt: |
          请使用思维链（Chain of Thought）方法，一步一步地分析以下问题。
          不要跳过任何推理步骤，把你的思考过程全部展示出来。

          问题：{topic}

          请按以下结构输出：

          ### Step 1: 理解问题
          - 问题的核心是什么？
          - 有没有隐含的假设？

          ### Step 2: 拆解要素
          - 这个问题包含哪些子问题？
          - 各要素之间的关系是什么？

          ### Step 3: 逐个子问题分析
          对每个子问题：
          - 可能的原因/解决方案
          - 证据/推理

          ### Step 4: 综合判断
          - 综合所有分析，结论是什么？
          - 这个结论的置信度有多高？

          ### Step 5: 行动建议
          - 基于这个结论，下一步该做什么？

  - id: "TIPS-39"
    name: "恶魔代言人AI指出问题"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "设定挑剔的评审员人格，从第三者视角无情揭露策划案中的漏洞和风险"
    stepCount: 1
    steps:
      - name: "魔鬼挑刺"
        prompt: |
          你是一位以"挑刺"著称的严苛评审——"恶魔的代言人"。你的任务就是找出方案中的所有问题。
          不要客气，不要委婉，你越是挑出致命问题，越是在帮用户。

          方案内容：{topic}

          请从以下角度无情挑刺（每个角度至少2条）：

          **1. 逻辑漏洞**
          - 因果链哪里断了？
          - 假设哪里站不住脚？
          - "因为A所以B"中，A真的能推出B吗？

          **2. 可行性缺陷**
          - 预算/人力/时间哪里不现实？
          - 需要的能力用户真的有吗？

          **3. 市场风险**
          - 对手会怎么反击？
          - 用户凭什么选你不选别人？
          - 市场真的存在吗？

          **4. 执行障碍**
          - 落地过程中最可能卡在哪一步？
          - 团队内部谁会反对？为什么？

          **5. 隐藏假设**
          - 方案基于哪些未经验证的前提？
          - 如果这些前提是错的，整个方案还能成立吗？

          最后：这个方案值不值得做？（诚实回答，不怕得罪人）

  - id: "TIPS-40"
    name: "替代方案生成器制定最优解"
    category: "AI独学-输出深化"
    chapter: 3
    difficulty: "中级"
    description: "AI基于发现的问题点，瞬间生成多种具备可行性的备选方案"
    stepCount: 1
    steps:
      - name: "替代方案"
        prompt: |
          你是一位创意解决问题专家。已知以下问题和约束条件，请生成多个替代方案：

          问题/课题：{topic}

          请产出：
          ### 方案矩阵
          | | 方案A | 方案B | 方案C | 方案D |
          |--|------|------|------|------|
          | **核心思路** | | | | |
          | **成本** | | | | |
          | **时间** | | | | |
          | **风险** | | | | |
          | **预期效果** | | | | |
          | **创新度** | | | | |

          ### 方案对比分析
          - 最安全的选择：方案__
          - 最高回报的选择：方案__
          - 最快见效的选择：方案__
          - 最创新的选择：方案__

          ### 推荐路线
          综合来看，推荐从方案__开始，同时为方案__做准备。

          理由：[3-4句]

  # ==========================================
  # 第4章：机制化 — 系统性产出 (TIPS 41-50)
  # ==========================================

  - id: "TIPS-41"
    name: "AI投资人将构思升华为计划书"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "高级"
    description: "模拟严苛的投融资面谈，通过高强度问答补全市场、收益和风险模块"
    stepCount: 1
    steps:
      - name: "商业计划打磨"
        prompt: |
          你是一位传奇AI投资人，管理着10亿基金。现在有一个创业者带着以下构思来找你融资。
          请用最严苛的标准来审核这个构思，并通过问答帮TA把构思升级为投资级别的商业计划书。

          创业构思：{topic}

          ### Round 1: 直击要害的 5 个问题
          提出5个最能检验这个构思的问题（如果回答不上来，说明构思还不成熟）

          ### Round 2: 补全计划书框架
          请用户按以下结构补全信息：
          1. **问题**: 你要解决什么痛点？（用具体数据）
          2. **解决方案**: 你的方案为什么比别人好10倍？
          3. **市场规模**: TAM/SAM/SOM 分别是多少？
          4. **商业模式**: 怎么赚钱？谁付费？
          5. **竞争优势**: 为什么只有你能做？
          6. **团队**: 为什么你是对的人？
          7. **财务预测**: 18个月内的收入和成本
          8. **融资需求**: 要多少钱？花在哪？达到什么里程碑？

          ### Round 3: 投资建议
          基于以上信息，你会投资吗？
          - 如果投：估值建议、条款建议
          - 如果不投：缺什么条件？

  - id: "TIPS-42"
    name: "解析旧作把握认知偏差"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "高级"
    description: "AI通过对过往文档的模式分析，指出用户在决策中易犯的心理偏差"
    stepCount: 1
    steps:
      - name: "认知偏差分析"
        prompt: |
          你是一位认知心理学家。请分析我过去的写作/决策记录，帮我识别自己的"思维盲区"：

          我的作品/记录：{topic}

          请分析：
          ### 认知偏差诊断

          **模式识别**
          - 你反复出现的思维模式是什么？
          - 你容易陷入的认知偏差有哪些？（参考以下清单）
            - 确认偏误：只看到支持自己观点的信息
            - 过度自信：高估自己的判断准确度
            - 锚定效应：过度依赖第一个信息
            - 损失厌恶：过度害怕失败而不敢冒险
            - 从众效应：跟着大多数人走
            - ...

          **具体证据**
          从你的作品中找到 3 个体现这些偏差的具体例子

          **改进建议**
          针对每种偏差，给出一个具体的"纠正练习"
          - 例如："下次做决策前，强制列出3个反对理由"

  - id: "TIPS-43"
    name: "灵感语音→调研到框架瞬间输出"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "中级"
    description: "利用AI的自动化工作流，在录入灵感的瞬间自动匹配相关背景资料"
    stepCount: 1
    steps:
      - name: "灵感到框架"
        prompt: |
          你是一位创意执行助手。我刚刚有一个灵感，请帮我瞬间把它从一个模糊的想法发展成可执行的框架：

          我的灵感：{topic}

          请完成以下"灵感→框架"转化：

          ### 灵感捕获
          - 这个灵感的核心是什么？（用一句有力的话表达）

          ### 自动匹配背景
          - 这个灵感跟什么趋势/事件/需求有关？（基于你的知识库）
          - 有没有类似的成功案例？

          ### 快速框架
          ```
          [项目名称]
          ├── 目标用户：[谁最需要这个？]
          ├── 核心价值：[解决了什么问题？]
          ├── 关键动作：[最重要的3步]
          ├── 所需资源：[时间/钱/人]
          └── 第一步：[明天就能开始的事]
          ```

          ### 风险评估
          - 这个灵感最大的风险是什么？
          - 怎么用最小成本验证它？

  - id: "TIPS-44"
    name: "隐喻魔术师拆解难懂概念"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "中级"
    description: "根据对方熟悉的世界观，定制个性化且贴切的比喻"
    stepCount: 1
    steps:
      - name: "定制隐喻"
        prompt: |
          你是"隐喻魔术师"——擅长用任何人能理解的比喻来解释复杂概念。

          复杂概念：{topic}

          请为以下不同背景的听众，各自定制一套比喻：

          ### 给农民/种植者
          （用农业相关的比喻：土壤、生长、季节、收成...）
          > 这个概念就像...

          ### 给厨师/美食家
          （用烹饪相关的比喻：食材、火候、调味、配方...）
          > 这个概念就像...

          ### 给运动员/教练
          （用运动相关的比喻：训练、比赛、战术、突破...）
          > 这个概念就像...

          ### 给家长/老师
          （用教育相关的比喻：成长、学习、引导、启蒙...）
          > 这个概念就像...

          ### 给程序员/工程师
          （用技术相关的比喻：架构、接口、迭代、调试...）
          > 这个概念就像...

          原则：
          - 比喻要准确映射概念的核心结构，不只是表面的相似
          - 每个比喻后面加一句"为什么这个比喻是准确的"

  - id: "TIPS-45"
    name: "图解直观理解科学抽象概念"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "高级"
    description: "将公式或文字描述的抽象概念转化为动态、可操作的视觉化描述"
    stepCount: 1
    steps:
      - name: "图解抽象"
        prompt: |
          你是一位科学可视化专家。请把以下抽象概念变成直观的图解说明：

          抽象概念：{topic}

          请从多个角度来"可视化"这个概念：

          ### 1. 类比图解
          用一个日常生活中可见的类比来说明

          ### 2. 流程图解
          如果涉及过程/变化：
          ```
          [初始状态] → [关键触发] → [中间状态] → [最终结果]
          ```

          ### 3. 层次图解
          如果涉及不同层级：
          ```
          宏观层：...
            ↓
          中观层：...
            ↓
          微观层：...
          ```

          ### 4. 对比图解
          如果涉及对比：
          | 维度 | 传统理解 | 正确理解 |
          |------|---------|---------|
          | | | |

          ### 5. 一句话记忆锚点
          用一句让人过目不忘的话来概括这个概念的精髓

  - id: "TIPS-46"
    name: "构建个人知识库第二大脑"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "中级"
    description: "利用知识库工具整合过往项目资料，让AI基于个人积累提供决策辅助"
    stepCount: 1
    steps:
      - name: "知识库构建"
        prompt: |
          你是一位个人知识管理（PKM）专家。请帮我设计一个"第二大脑"系统：

          我的需求/场景：{topic}

          请设计：
          ### 知识库架构
          ```
          收件箱 (Inbox)
          ├── 待处理的想法和资料
          │
          知识库 (Knowledge Base)
          ├── 领域1: [名称]
          │   ├── 核心概念
          │   ├── 项目经验
          │   └── 参考资料
          ├── 领域2: [名称]
          │   └── ...
          └── 跨界连接
              ├── 概念A ←→ 概念B 的关联
              └── ...

          项目库 (Projects)
          ├── 进行中
          ├── 已完成
          └── 复盘总结
          ```

          ### 工作流设计
          1. **捕获**：怎么快速记录灵感？（工具+方法）
          2. **整理**：多久整理一次？怎么分类？
          3. **提取**：需要的时候怎么快速找到？
          4. **产出**：怎么从知识库中"组装"出新内容？

          ### 工具推荐
          - 轻量方案（免费/低成本）
          - 专业方案（功能更强大）
          - 每种方案的优缺点

  - id: "TIPS-47"
    name: "借助AI猎头掌握职场竞争力"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "中级"
    description: "通过市场数据客观评估个人身价，制定提升年薪的具体技能学习路径"
    stepCount: 1
    steps:
      - name: "竞争力评估"
        prompt: |
          你是一位顶级猎头顾问（Headhunter）。请客观评估我的职场竞争力和市场价值：

          我的背景：{topic}

          请分析：
          ### 市场价值评估
          - **当前市场定位**：你在人才市场的哪个"细分赛道"？
          - **竞争力评分**（每个维度 1-10）：
            | 维度 | 分数 | 优势 | 差距 |
            |------|------|------|------|
            | 专业技能深度 | | | |
            | 行业经验广度 | | | |
            | 管理/领导能力 | | | |
            | 商业思维 | | | |
            | 沟通影响力 | | | |
            | 学习能力/潜力 | | | |

          ### 薪资潜力
          - 你目前的技能组合在市场上大概值多少？
          - 如果补上最大的 1 个短板，能提升多少？

          ### 职业跃升路径
          给 3 条不同的职业发展路径（2年时间窗口）：
          - 路径A：深耕现有领域 → 成为专家
          - 路径B：横向扩展 → 成为复合型人才
          - 路径C：转型 → 进入新领域

          每条路径标注：难度、时间、预期回报、风险

  - id: "TIPS-48"
    name: "从未来预测倒推3年生涯战略"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "高级"
    description: "基于AI对行业趋势的研判，反推现在必须掌握的抗淘汰技能"
    stepCount: 1
    steps:
      - name: "未来倒推"
        prompt: |
          你是一位未来学家 + 职业战略顾问。让我们做一次"未来倒推"（Backcasting）：

          我的领域/关注方向：{topic}

          ### 第1步：3年后的世界（2029年）
          预测这个领域3年后会变成什么样？
          - 什么会被AI完全替代？
          - 什么会变得比现在重要10倍？
          - 什么今天热门的东西3年后可能消失？

          ### 第2步：3年后的你
          在这个未来世界里，你想站在什么位置？
          描述一个具体的画面。

          ### 第3步：倒推路径
          从3年后倒推回今天：
          ```
          2029年（目标）: [你要达到的状态]
              ↑ 需要...
          2028年（里程碑2）: [需要具备什么]
              ↑ 需要...
          2027年（里程碑1）: [需要完成什么]
              ↑ 需要...
          今天: [第一步行动]
          ```

          ### 第4步：抗淘汰技能清单
          列出3项你今天就应该开始培养的技能：
          1. [技能] — 为什么不会被AI淘汰？
          2. [技能] — 为什么要现在开始？
          3. [技能] — 怎么开始？

  - id: "TIPS-49"
    name: "读书DNA遇见命运之书"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "中级"
    description: "AI深度分析过往阅读喜好背后的本质，跨领域推荐真正契合当前需求的书籍"
    stepCount: 1
    steps:
      - name: "阅读DNA分析"
        prompt: |
          你是"AI司书"——一个深度理解阅读者灵魂的图书馆员。请分析我的"阅读DNA"：

          我读过的/喜欢的书/内容：{topic}

          请完成：
          ### 阅读DNA图谱
          - **你的阅读基因**：你喜欢的东西背后有什么共同特征？
            （不是"喜欢商业书"，而是"喜欢用第一性原理拆解复杂问题的人"）
          - **隐藏的兴趣线索**：你喜欢的书之间有什么隐秘的关联？
          - **阅读舒适区 vs 盲区**：你停留在哪里？忽略了什么？

          ### 命运之书推荐（3本）
          推荐3本可能"改变你人生轨迹"的书：
          | 书名 | 作者 | 为什么是"你的书" | 预期改变什么 |
          |------|------|----------------|------------|

          注意：
          - 不要推荐畅销榜上的"大众书"
          - 要像了解你多年的朋友一样精准推荐
          - 可以跨领域（一本小说可能比一本商业书更适合现在的你）

  - id: "TIPS-50"
    name: "体得AI时代超输出思考法"
    category: "AI独学-机制化"
    chapter: 4
    difficulty: "高级"
    description: "将AI视为外部脑，人类通过提出本质性提问和注入灵魂来定义终极产出"
    stepCount: 1
    steps:
      - name: "超输出思考"
        prompt: |
          你是"超输出思考法"的导师。在这个AI时代，人类的竞争力不在于"处理更多信息"，而在于"提出本质性的问题"和"注入独特的灵魂"。

          你的课题/目标：{topic}

          请引导我完成"超输出思考法"的完整流程：

          ### 第一层：本质性提问
          不要问"怎么做"，要问：
          - 这个课题之所以存在的根本原因是什么？
          - 如果完全反过来想，会怎样？
          - 10年后回头看，这个问题的哪些部分会变得不重要？
          - 如果我的所有假设都是错的，真相可能是什么？
          - 这个问题背后，人们真正的渴望是什么？

          ### 第二层：AI高速执行
          把上面提炼出的"本质问题"转化为AI可以执行的指令：
          - 研究指令：AI应该搜索什么？
          - 分析指令：AI应该怎么处理信息？
          - 产出指令：AI应该输出什么格式？

          ### 第三层：人类注入灵魂
          AI产出了基础内容后，你作为人类应该加入什么？
          - 你的个人经历中有什么与这个课题相关的独特故事？
          - 你的价值观能给这个方案什么特殊的"温度"？
          - 你看到的"AI看不到的东西"是什么？

          ### 第四层：重新定义产出
          跳出常规的输出形式：
          - 除了写报告/做PPT，这个课题还能以什么形式产出？
          - 什么形式的产出最能体现你的独特价值？
