# 徐振伟智能体 - 农业领域知识库
# 将用户的农业培训业务与56技法建立横向联系

domain:
  name: "徐振伟·菌田农法"
  description: "12年土壤微生物经验，日本北海道研修归国，专注酵素菌/岛本发酵技术推广与农业培训"

  # 核心业务板块
  businesses:
    - id: "bacteria"
      name: "酵素菌/岛本发酵技术培训"
      target_customers: "农企老板、合作社、家庭农场、肥料企业"
      pain_points:
        - "客户不知道酵素菌是什么"
        - "传统肥料经销商抵制"
        - "技术门槛高，农户学不会"
        - "效果验证周期长（一季作物），客户等不及"
        - "竞品华滨生物已做27年"
      revenue_model: "线上会员600-1180元/年 + 菌剂销售20-35元/kg + 企业培训4500-5000元/场"
      suggested_techniques:
        - { id: "005", reason: "用虚拟专家会诊，从8个角度分析你的竞争优势" }
        - { id: "002", reason: "把菌剂推广目标提高10倍，找到破局策略" }
        - { id: "031", reason: "模拟客户质疑，提前准备应对话术" }
        - { id: "035", reason: "设计第一批菌剂用户的获取策略" }
        - { id: "048", reason: "找出农户对现有肥料的不满，提炼你的卖点" }
        - { id: "026", reason: "用精益画布重新规划菌剂商业模式" }

    - id: "tomato"
      name: "高糖西红柿种植示范"
      target_customers: "冷棚种植户、高端农产品渠道、采摘园"
      pain_points:
        - "光辉101品种种植密度和成本控制"
        - "台风风险导致苗期延迟"
        - "棚主资金紧张（777元剩余）"
        - "如何把高糖西红柿卖出高价（10-20元/斤）"
      revenue_model: "收益分红 + 培训案例引流"
      suggested_techniques:
        - { id: "030", reason: "台风、资金、病害三大风险全扫描" }
        - { id: "034", reason: "番茄项目18个月财务预测" }
        - { id: "033", reason: "写一篇高糖番茄成功上市的新闻稿，用结果倒推策略" }
        - { id: "036", reason: "拍一个30秒高糖番茄短视频脚本" }
        - { id: "036", reason: "用你的番茄示范田拍短视频引流" }

    - id: "training"
      name: "六产学院·农业总经理培训班"
      target_customers: "农企董事长/总经理、政府农业官员、农业投资人"
      pain_points:
        - "招生难，客户不知道'六产'是什么"
        - "98000元定价太高，目标客群觉得贵"
        - "训练营10000元/企业还亏钱"
        - "从线上课(999)到咨询(30万)没有中间产品"
        - "竞争对手有北大/浙大农企总裁班"
      revenue_model: "总经理班68,000-98,000元/人 + 顾问30万/年 + 日本游学25,000元/人"
      suggested_techniques:
        - { id: "003", reason: "设计'半成品'培训方案，让潜在客户产生参与感" }
        - { id: "028", reason: "分析你(日本经验+AI能力)的独特优势，找到差异化定位" }
        - { id: "052", reason: "描绘学员毕业后'获得喜悦'的场景，反过来优化课程设计" }
        - { id: "014", reason: "极致性价比：把98000元的产品价值做到让客户觉得值" }
        - { id: "035", reason: "不靠广告，怎么找到第一批20个学员？" }
        - { id: "042", reason: "调研日本/台湾类似的农业培训模式" }

    - id: "content"
      name: "农业短视频IP打造"
      target_customers: "抖音/B站/视频号/小红书的农业从业者和消费者"
      pain_points:
        - "选题不够爆款"
        - "剪辑耗时，一个人做不过来"
        - "粉丝增长慢"
        - "不知道怎么变现"
      revenue_model: "内容引流→会员600元→培训/菌剂变现"
      suggested_techniques:
        - { id: "009", reason: "随机词碰撞法产生爆款选题" }
        - { id: "007", reason: "围绕'酵素菌'发散100个关联词，找选题角度" }
        - { id: "001", reason: "从动物特性跨界联想到农业内容创意" }
        - { id: "033", reason: "假设你的账号3年后100万粉丝，写一篇新闻稿" }
        - { id: "036", reason: "为每个选题自动生成30秒视频脚本" }

    - id: "huateng"
      name: "华腾猪六产合作"
      target_customers: "浙江华腾集团、养猪户、猪肉消费者"
      pain_points:
        - "方案需要说服沈建平董事长"
        - "猪IP能否跑通不确定"
        - "多层次收入模型(认养+内容+培训+服务)哪个先做"
      revenue_model: "猪认养分润3,600元/头 + 内容变现4,000-18,000元/月 + 技术服务18-36万/年"
      suggested_techniques:
        - { id: "031", reason: "模拟沈建平董事长挑刺，提前准备Q&A" }
        - { id: "029", reason: "模拟各方(养猪户、消费者、华腾管理层)对猪IP的反应" }
        - { id: "027", reason: "对多层次收入模型的每个层次打分评估可行性" }
        - { id: "013", reason: "用TRIZ40招优化养猪流程" }

  # 技术专长领域（可被AI自动识别）
  expertise:
    - "酵素菌（岛本酵素）扩繁、施用、效果评估"
    - "高糖番茄（光辉101）冷棚种植技术"
    - "菌田农法·标准操作手册"
    - "日本六次产业化理论与实践"
    - "农业AI应用（内容生成、数据分析、智能诊断）"
    - "阿米巴经营在农业企业的应用"
    - "自然农法/有机农业全球趋势"
    - "日本发酵产业（味增、纳豆、酱油、醋、豆腐）"
