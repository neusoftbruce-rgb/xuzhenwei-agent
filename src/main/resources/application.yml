server:
  port: 8080

# Spring Security 自动配置（关闭默认登录，由 SecurityConfig 接管）
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  application:
    name: xuzhenwei-agent

  # 智谱AI API 配置 (OpenAI 兼容格式, v2.5)
  # 获取API Key: https://open.bigmodel.cn/usercenter/apikeys
  ai:
    openai:
      api-key: ${ZHIPU_API_KEY:cd04c8857a604ffd82a12b25e1979bdf.b8Jjm2cb3RZ8SBRA}
      base-url: https://open.bigmodel.cn/api/paas/v4
      chat:
        completions-path: /chat/completions   # 智谱不用 /v1 前缀, 覆盖Spring AI默认值
        options:
          model: glm-5.2            # 智谱5.2 (1M超长上下文)
          temperature: 0.7
          max-tokens: 4096

  # H2 文件数据库（重启不丢数据）
  datasource:
    url: jdbc:h2:file:./data/xuzhenwei-agent;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# 日志
logging:
  level:
    com.xuzhenwei.agent: DEBUG
    org.springframework.ai: INFO

# 自定义配置
agent:
  techniques:
    max-turns: 10
    prompt-directory: classpath:/prompts
  conversation:
    max-history: 80           # v2.5: 40→80 增加上下文窗口
    summary-threshold: 20     # v2.5: 超过20条自动摘要旧消息
  # v2.3: 深度思考配置 (智谱用 glm-4-plus 做深度推理)
  deep-think:
    max-reasoning-chars: 2000
    max-history-inject: 10    # v2.5: 6→10 注入更多上下文
  # v2.3: 频率限制
  rate-limit:
    normal-per-minute: 20
    deep-per-minute: 10
  memos:
    enabled: ${MEMOS_ENABLED:false}
    base-url: https://neusoftbruce-xuzhenwei.hf.space
    api-key: ${MEMOS_API_KEY:memos_pat_YDsKyIjJdNTGTMYqk9Ext1TIKtuu2NLJ}

# 微信小程序
wechat:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

# JWT
jwt:
  secret: ${JWT_SECRET:xuzhenwei-agent-miniapp-jwt-secret-key-2026}
  expiration-ms: 2592000000
