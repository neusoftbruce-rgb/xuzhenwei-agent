server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  application:
    name: xuzhenwei-agent

  # DeepSeek API 配置 (OpenAI 兼容格式)
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:your-deepseek-api-key}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096

  # H2 开发数据库
  datasource:
    url: jdbc:h2:mem:xuzhenwei-agent;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# 日志
logging:
  level:
    com.xuzhenwei.agent: DEBUG
    org.springframework.ai: INFO

# 自定义配置
agent:
  techniques:
    max-turns: 10
    prompt-directory: classpath:/prompts
