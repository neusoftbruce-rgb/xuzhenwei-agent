# ============================================================
# 徐振伟智能体 — 56条技法定义（强化版 v2.0）
# 每条技法包含：角色设定 + 结构化提问 + 输出格式 + 质量标准
# ============================================================

techniques:

  # ==========================================
  # 第一部分：快速产生灵感（17条）
  # ==========================================

  - id: "001"
    name: "跨界特征联想法"
    category: "快速产生灵感"
    description: "从动物、植物的独特特征中找灵感，跨界套用到你的课题上。强制跳出人类思维惯性"
    stepCount: 2
    steps:
      - name: "提取生物特征"
        prompt: |
          你是一位生物学家兼创新顾问。
          请完成以下任务：

          **第1步**：列出 10 种不同生物（动物/植物/微生物），每种写出它最独特的 1 个特征。
          格式：`生物名 — 特征（一句话）`

          **第2步**：从上面选出 5 个最有启发性的特征，分别说明：这个特征如果应用到课题「{topic}」上，会产生什么新思路？
          格式：`特征：[特征名] → 启发：[2-3句具体分析]`

          **要求**：
          - 特征要具体，不要泛泛（"鹰的眼睛"比"视力好"更好）
          - 启发要有画面感，能让人"看到"应用场景
          - 不要给显而易见的老套路
      - name: "转化为可执行方案"
        prompt: |
          基于上一步的分析，选出 3 个最有价值的跨界灵感，转化为具体可执行的创意方案。

          每个方案格式：
          ### 方案名（吸引人的标题）
          - **灵感来源**：来自哪种生物的什么特征
          - **核心创意**：用 2 句话说明
          - **怎么做**：3 步具体行动
          - **预期效果**：做成了会怎样
          - **难度/成本**：⭐1-5 评级

          **要求**：
          - 方案要能落地，不要天马行空但不切实际
          - 3 个方案之间要有差异（不要换汤不换药）
          - 优先选低难度高回报的方案

  - id: "002"
    name: "10倍目标挑战法"
    category: "快速产生灵感"
    description: "把你的目标提高 10 倍，用极端压力逼出颠覆性创意。跳出修修补补的线性思维"
    stepCount: 3
    steps:
      - name: "设定10倍目标"
        prompt: |
          你是一位擅长"破坏式创新"的战略顾问。面对课题「{topic}」，请不要考虑任何限制条件。

          **任务**：
          1. 先明确当前的目标是什么（如果你判断不出，就按字面理解）
          2. 把目标放大 10 倍，用一句话描述这个极端目标
          3. 解释为什么这个 10 倍目标如果实现，会彻底改变局面

          **输出格式**：
          - 当前目标：[一句话]
          - 10倍目标：[一句话，要"吓人"才有意义]
          - 为什么值得追求：[2-3句]
      - name: "描绘7个实现后的画面"
        prompt: |
          假设上面的 10 倍目标已经实现了。请描绘 **7 个具体的、有画面感的场景**。

          每个场景要求：
          - 像电影镜头一样，有细节（谁、在哪里、在做什么、感受如何）
          - 不要抽象的"效率提升了""满意度提高了"
          - 要让读者能"看见"那个世界

          **格式**：
          ### 场景 1：[一句话标签]
          [3-5句具体描述，有画面有情感]

          ### 场景 2：[一句话标签]
          ...
      - name: "反推可执行方案"
        prompt: |
          基于上面 7 个场景，回到原始课题「{topic}」，请提供 **5 个可执行的创意方案**。

          每个方案格式：
          ### [编号] 方案名称（抓人眼球的标题）
          - **核心想法**（2句）
          - **为什么有效**（跟哪个场景有关联？解决了什么本质问题？）
          - **执行步骤**（3-4 步，具体到能交给下属执行）
          - **第一个行动**（明天就能开始的一件事）
          - **成功指标**（怎么判断做成了？）

          **排序要求**：按"投入产出比"从高到低排列

  - id: "003"
    name: "半成品激发法"
    category: "快速产生灵感"
    description: "故意让 AI 给出不完美的方案，留出'缝隙'让你来填补。完美的方案扼杀讨论，有缝隙的方案激发共创"
    stepCount: 2
    steps:
      - name: "生成半成品方案"
        prompt: |
          你是创意教练。关于课题「{topic}」，请提供 **5 个"半成品"方案**。

          "半成品"的定义：
          - 核心概念清晰、有冲击力、让人眼前一亮
          - 但执行细节刻意留白（故意不写完）
          - 像一道"闻着香但需要你亲手做完"的菜
          - 让人看完忍不住想说"我来补充一下..."

          **格式**（每个方案 3-4 句，不要多）：
          > **[方案标签]** — 核心概念（1句）
          > 为什么这个方向有意思（1句）
          > 留白部分：这里需要你来想...（1句引导）

          **要求**：5 个方案之间要有明显差异，覆盖不同角度
      - name: "引导用户延展"
        prompt: |
          基于上面 5 个半成品方案，作为创意教练，请向用户提出 **5 个启发式问题**来激发他们自己填补缝隙。

          问题设计原则：
          - 不要问"你觉得呢"这种无效问题
          - 要具体到某个方案的某个缝隙
          - 可以引导用户把两个方案的缝隙交叉缝合
          - 语气像教练——鼓励但不强推

          **格式**：
          > 💡 关于[方案 X]：如果你来设计[某个留白部分]，你会怎么做？比如...[给一个小提示]

          > 🔗 交叉联想：把[方案 A]的[某元素] + [方案 B]的[某元素]结合，会产生什么？

  - id: "004"
    name: "艺术灵感提取法"
    category: "快速产生灵感"
    description: "从名著、电影、名画中提取创意基因，嫁接到你的商业课题上"
    stepCount: 1
    steps:
      - name: "艺术灵感提取"
        prompt: |
          你是一位创意总监，擅长从艺术作品中提炼商业灵感。

          针对课题「{topic}」，请完成：

          **1. 作品推荐**（3 部）
          推荐 3 部与这个课题有"隐秘关联"的艺术作品（小说/电影/绘画），每部说明关联点。

          **2. 深度分析每部作品**
          - 这部作品的核心冲突/张力是什么？
          - 这个冲突跟你的课题有什么相似之处？
          - 作品中的角色是怎么解决（或面对）这个冲突的？
          - 这个解决方式能给你的课题什么启发？

          **3. 转化为商业创意**
          基于以上分析，给出 2-3 个具体的商业创意方案。

          ⚠️ **注意**：务必核实用到的作品名称和情节真实存在。如果引用了 AI 幻觉中的虚构作品，会严重破坏方案可信度。

  - id: "005"
    name: "虚拟专家会诊"
    category: "快速产生灵感"
    description: "让 AI 同时扮演 8 种角色的专家团队，从多维度给你的课题'会诊'"
    stepCount: 2
    steps:
      - name: "专家团会诊"
        prompt: |
          针对课题「{topic}」，你需要组建一个虚拟专家团。请**依次**扮演以下 8 位专家，每位给出 1-2 条独特见解：

          | # | 角色 | 思考风格 |
          |---|------|---------|
          | 1 | **创意专家** | 寻找风马牛不相及的事物之间的隐秘联系 |
          | 2 | **技术专家** | 关注可行性、实现路径、技术风险 |
          | 3 | **商业专家** | 关注商业模式、市场规模、盈利能力 |
          | 4 | **颠覆者** | 质疑一切常规假设，提出打破规则的方案 |
          | 5 | **社会学家** | 从人的行为模式、文化趋势、社会变迁看问题 |
          | 6 | **幽默家** | 从荒诞视角发现真理，在笑话里找洞见 |
          | 7 | **冒险家** | 敢想敢干，提出高风险高回报的大胆方案 |
          | 8 | **用户代言人** | 永远站在终端用户/消费者的立场 |

          **格式**：
          > 🎨 **创意专家**：[核心洞察]
          > 💡 具体建议：[1-2条]

          观点之间要有明显差异，不要重复。避免泛泛而谈。
      - name: "综合提炼行动方向"
        prompt: |
          综合 8 位专家的意见，为课题「{topic}」提炼 **3 个最有价值的行动方向**。

          每个方向格式：
          ### 方向 X：[名称]
          - **综合了哪些专家的视角**（列出专家角色）
          - **核心策略**（3-4句）
          - **第一步行动**
          - **预期效果**
          - **风险提示**

          **排序**：按"可落地性 × 影响力"从高到低

  - id: "006"
    name: "环保视角切入法"
    category: "快速产生灵感"
    description: "强制从环保和可持续发展角度审视课题，既能产生新创意又能提升品牌形象"
    stepCount: 1
    steps:
      - name: "环保视角分析"
        prompt: |
          你是一位 ESG（环境/社会/治理）顾问。针对课题「{topic}」，请从环保和可持续发展的角度重新分析：

          **1. 现状审视**
          - 现有做法在环保方面有什么问题？（至少 3 点）
          - 这些问题如果不解决，5 年后会面临什么风险？（监管/市场/舆论）

          **2. 绿色机会**
          - 如果换成环保方式，会产生什么新机会？（新客群/成本节约/品牌溢价/政策补贴）
          - 给出 3 个兼顾商业价值和环保价值的方案

          **3. 每个方案包含**
          - 方案简述（2句）
          - 环保价值（具体减碳/减排/减废数据预期）
          - 商业价值（增收/降本/获客）
          - 实施难度（⭐1-5）

  - id: "007"
    name: "关联词发散法"
    category: "快速产生灵感"
    description: "让 AI 列出 100 个关联词，在看似无关的词汇中寻找突破口"
    stepCount: 1
    steps:
      - name: "关联词发散"
        prompt: |
          针对课题「{topic}」：

          **第一步：强关联词**
          列出 30 个强关联的词语（跟课题直接相关的概念、对象、动作）

          **第二步：弱关联词**
          再列出 50 个"弱关联"词——表面上不相关，但仔细想想有某种隐秘联系的词。这些词应该来自完全不同的领域。

          **第三步：选出最有启发的 5 个弱关联词**
          对每个弱关联词回答：
          - 这个词跟课题有什么隐秘联系？
          - 这个联系能带来什么新思路？

          **第四步：产出创意**
          基于最有价值的 2 个联系，各自给出 1 个具体的创意方案。

          ⚠️ 弱关联词不要选太明显的。最好的灵感往往来自"看起来完全没关系但仔细想想很有道理"的词。

  - id: "008"
    name: "六维换位思考法"
    category: "快速产生灵感"
    description: "强制从 6 个维度（人/物/过程/环境/价值/感官）轮番审视课题，穷尽每个视角"
    stepCount: 1
    steps:
      - name: "六维换位"
        prompt: |
          针对课题「{topic}」，请从以下 6 个维度分别产出创意，每个维度至少 2 个：

          ### 1. 人的维度
          谁参与？谁受益？谁被忽视了？如果换个角色（用户→供应商→竞争对手→路人），会看到什么？

          ### 2. 物的维度
          用了什么工具/产品/材料？能不能换？能不能去掉？能不能合并？

          ### 3. 过程的维度
          流程是什么？先做什么后做什么？哪个环节最浪费时间？如果顺序反过来会怎样？

          ### 4. 环境的维度
          在什么场景下发生？换个时间/地点/天气/文化背景会怎样？

          ### 5. 价值的维度
          创造了什么价值？谁愿意为此付费？如果不收费还能怎么赚钱？

          ### 6. 感官的维度
          用户看到/听到/闻到/触摸到什么？这些感官体验中藏着什么改进机会？

          **输出格式**：每个维度用 ### 小标题，下面列出 2-3 个洞察 + 对应的创意方向。

  - id: "009"
    name: "随机词碰撞法"
    category: "快速产生灵感"
    description: "AI 随机生成 100 个词，拿你的课题跟它们强行碰撞，产生意想不到的火花"
    stepCount: 1
    steps:
      - name: "随机碰撞"
        prompt: |
          请随机列出 100 个中文词语（覆盖：物品/职业/地点/情绪/动作/自然现象/抽象概念）。

          然后围绕课题「{topic}」，完成：

          **碰撞分析**：从 100 个词中选 5 个最有"碰撞感"的词
          对每个词回答：
          - 碰撞公式：`[课题] × [词语] = ?`
          - 产生的创意火花（2-3 句）

          **创意方案**：从 5 个火花中选 2 个最有价值的，各自发展成完整的创意方案（每个方案：核心想法 + 3步行动 + 预期效果）

          ⚠️ 碰撞要大胆，不要只选"一看就有关系"的词。越离谱的组合越可能出惊喜。

  - id: "010"
    name: "跨界杂交法"
    category: "快速产生灵感"
    description: "把两个完全不搭边的领域强行组合，看看会产生什么新物种"
    stepCount: 1
    steps:
      - name: "跨界杂交"
        prompt: |
          针对课题「{topic}」，请列出 7 个看起来**完全不相关**的领域或概念（如：蚂蚁社会、珊瑚礁、爵士乐、围棋、禅宗、夜市、深海）。

          然后逐一完成"杂交实验"：

          | # | 跨界领域 | 核心特征 | 杂交后的创意 |
          |---|---------|---------|------------|
          | 1 | ... | ... | ... |

          最后，从 7 个杂交结果中选出最有价值的 3 个，各自发展成具体方案：

          ### 杂交方案 X：[名称]
          - 灵感来源：[跨界领域] 的 [核心特征]
          - 怎么用：[3-4句]
          - 为什么值得试：[1-2句]

  - id: "011"
    name: "图像灵感法"
    category: "快速产生灵感"
    description: "上传一张照片，AI 从画面中提取 10 种联想转化为创意素材（需上传图片）"
    stepCount: 1
    steps:
      - name: "图像灵感"
        prompt: |
          我上传了一张照片。请仔细观察画面中的每一个细节（光线、颜色、人物、物体、构图、氛围）。

          **第1步：列出 10 个观察和联想**
          （不用是正面的，什么联想都行）

          **第2步：选出 3 个最有启发的联想**
          围绕课题「{topic}」，每个联想发展成一个创意方向。

          **格式**：
          > 📷 联想：...
          > 💡 创意方向：...
          > 🎬 具体应用：...

  - id: "012"
    name: "无限资源畅想法"
    category: "快速产生灵感"
    description: "假设预算/时间/技术/人力完全没限制，理想方案是什么？先放开再收敛"
    stepCount: 1
    steps:
      - name: "无限畅想"
        prompt: |
          假设完全没有限制条件——无限预算、无限时间、无限人力、没有法律法规约束、没有技术瓶颈。

          针对课题「{topic}」，请：

          **1. 理想方案**（3个）
          不用考虑可行性，给出 3 个最理想的解决方案。怎么"疯狂"怎么来。

          **2. 降级分析**（每个理想方案）
          - 这个方案里，哪些部分在现实中是可以保留的？
          - 怎么降级成一个"现实版"？
          - 现实版跟理想版的核心差距在哪里？这个差距能用什么方式弥补？

          **3. 行动清单**
          基于可保留的部分，列出 5 个可以马上开始的小行动。

  - id: "013"
    name: "TRIZ创新40招"
    category: "快速产生灵感"
    description: "应用经典 TRIZ 发明理论中的 40 个创新原则，系统化地改良产品和流程"
    stepCount: 1
    steps:
      - name: "TRIZ应用"
        prompt: |
          你是 TRIZ 创新方法论专家。针对课题「{topic}」，从以下 10 个 TRIZ 原则中选择至少 5 个来应用：

          | 原则 | 说明 | 举例 |
          |------|------|------|
          | 分割 | 把整体拆成独立部分 | 模块化家具 |
          | 合并 | 把相似功能合并 | 瑞士军刀 |
          | 反向 | 反过来做 | 客户来找你→你去找客户 |
          | 动态化 | 让固定变灵活 | 可调节高度的桌子 |
          | 预先作用 | 提前准备好 | 预制菜 |
          | 周期性 | 用节奏代替持续 | 限量发售 |
          | 复制 | 用便宜的复制品替代 | 3D打印原型 |
          | 丢弃 | 用完即弃/自动消失 | 可降解包装 |
          | 改变颜色 | 用颜色传递信息 | 温度变色杯 |
          | 多孔材料 | 利用孔洞/空隙 | 海绵城市 |

          **输出格式**：
          > 🔧 原则：[名称]
          > 📐 应用：[3-4句怎么用到课题上]
          > 🎯 预期改进：[1-2句]

          要求：每个应用要具体到能计算效果（省了多少？快了多久？多了多少？）

  - id: "014"
    name: "极致性价比法"
    category: "快速产生灵感"
    description: "功能最大化 × 成本最小化——在看似矛盾的目标下寻找最优解"
    stepCount: 1
    steps:
      - name: "极致性价比"
        prompt: |
          你是价值工程专家。针对课题「{topic}」，请追求**极致性价比**：

          **1. 极致版方案**
          如果要把功能/价值发挥到最大，同时把成本/风险降到最低，最理想的方案是什么？
          描述这个"最优状态"。

          **2. 拆解分析**
          | 维度 | 当前状态 | 极致版 | 差距 | 可缩减的浪费 |
          |------|---------|--------|------|------------|
          | 功能 | | | | |
          | 成本 | | | | |
          | 时间 | | | | |
          | 风险 | | | | |

          **3. 实现路径**
          从当前状态到极致版，需要走哪 3 步？每步需要什么资源？

  - id: "015"
    name: "10年倒推法"
    category: "快速产生灵感"
    description: "先想象 10 年后的世界，再倒推回来，推导今天该做什么"
    stepCount: 1
    steps:
      - name: "未来倒推"
        prompt: |
          针对课题「{topic}」：

          **1. 列出未来 10 年的重大变化因子**（5-7个）
          技术、社会、政策、环境、人口...哪些变化会彻底重塑这个领域？

          **2. 描述 10 年后的景象**
          基于这些变化，10 年后这个领域变成了什么样？
          写一个有画面感的场景描述。

          **3. 倒推路径**
          从 10 年后的景象往回推：
          - 第 10 年：世界是什么样的？
          - 第 7 年：什么转折发生了？
          - 第 5 年：谁赢了？谁被淘汰了？
          - 第 3 年：早期信号是什么？
          - 第 1 年：有远见的人开始做什么？
          - **今天**：你应该启动什么？

          **4. 3 个立即行动**
          基于倒推结果，今天开始该做的 3 件事。

  - id: "016"
    name: "历史加速推演法"
    category: "快速产生灵感"
    description: "回顾过去 30 年的变化轨迹，按同样速度推算未来 15 年"
    stepCount: 1
    steps:
      - name: "历史外推"
        prompt: |
          针对课题「{topic}」：

          **1. 历史回顾（过去 30 年）**
          列出至少 5 个重大变化节点，标注每个节点的变化幅度（10倍？100倍？质变？）

          **2. 加速度判断**
          变化是在加速、匀速、还是减速？为什么？
          给出你的判断依据。

          **3. 15 年后的预测**
          假设变化以同样（或更快的）速度继续，15 年后会怎样？
          给出 3 个具体的预测。

          **4. 今天的行动**
          为了在 15 年后占据优势，今天应该开始做的 3 件事。
          每件事标注：投入多少、风险多大、不做会怎样。

  - id: "017"
    name: "SCAMPER九变法"
    category: "快速产生灵感"
    description: "经典创新工具：替代/合并/改造/放大缩小/移作他用/删除/重排/逆转"
    stepCount: 1
    steps:
      - name: "九维变法"
        prompt: |
          用 SCAMPER 框架对课题「{topic}」进行 360° 改造：

          | 维度 | 提问 | 你的改造方案 |
          |------|------|------------|
          | **S**ubstitute 替代 | 用什么可以替代现有元素？ | |
          | **C**ombine 合并 | 能和什么合并产生 1+1>2？ | |
          | **A**dapt 改造 | 调整什么来适应新需求？ | |
          | **M**odify 放大/缩小 | 什么可以变大/变小/变快/变慢？ | |
          | **P**ut to other use 移作他用 | 还能用来干什么？给谁用？ | |
          | **E**liminate 删除 | 去掉什么反而更好？ | |
          | **R**earrange 重排 | 改变顺序/结构会怎样？ | |
          | **R**everse 逆转 | 反过来做会怎样？ | |

          每个维度至少产出 1 个可执行的改造方案。最后选出最有价值的 3 个方案详述。

  # ==========================================
  # 第二部分：打磨完善创意（15条）
  # ==========================================

  - id: "018"
    name: "盲区扫描法"
    category: "打磨完善创意"
    description: "分析已有方案，找出被忽略的方向和还没探索的可能性"
    stepCount: 1
    steps:
      - name: "扫描盲区"
        prompt: |
          你是一个严密的"找茬专家"。分析方案「{topic}」，找出所有被忽略的维度。

          **1. 现有方案的特征分析**
          - 这些方案的共同假设是什么？（"用户一定会..." "市场肯定会..."）
          - 方案集中在哪些维度？（产品？价格？渠道？体验？）
          - 哪些维度完全没被提到？

          **2. 盲区清单**
          列出至少 5 个被忽略的方向，每个标注：
          - 为什么被忽略了？
          - 如果探索这个方向，可能发现什么？

          **3. 最有价值的 2 个盲区**
          给出具体的探索方案。

  - id: "019"
    name: "亮点挖掘法"
    category: "打磨完善创意"
    description: "对一个还没成型的点子，先找 4 个优点夸一夸，再给 1 个改进建议"
    stepCount: 1
    steps:
      - name: "挖掘亮点"
        prompt: |
          你是一位善于"接住"创意的好教练。针对这个还不太成熟的创意「{topic}」：

          **第1步：找出 4 个亮点**
          认真看这个创意，找出它真正有意思的地方。不是敷衍的夸奖，而是指出它独特的价值潜力。

          **第2步：1 个关键建议**
          给出一个能让这个创意提升一个台阶的建议。
          方式是"如果...会不会更好？"而不是"你应该..."

          **第3步：发展建议**
          如果按照你的建议发展，这个创意会变成什么样？
          写一个"升级版"的创意描述。

          ⚠️ 原则：目的是让创意活下去并变好，不是把它枪毙。批评要有建设性。

  - id: "020"
    name: "最优方案筛选法"
    category: "打磨完善创意"
    description: "从一箩筐方案中挑出最有潜力的那个，并给出升级路径"
    stepCount: 1
    steps:
      - name: "筛选升级"
        prompt: |
          从以下备选方案中「{topic}」，请完成：

          **1. 评估矩阵**
          | 方案 | 新颖度⭐ | 可行性⭐ | 影响力⭐ | 投入产出⭐ | 总分 |
          |------|---------|---------|---------|----------|------|
          | ... | | | | | |

          **2. 最优方案**
          选出总分最高的方案，说明：
          - 为什么是它（3 个理由）
          - 它最大的弱点是什么
          - 如何补强这个弱点

          **3. 升级版方案**
          给出优化后的完整方案（改了什么、为什么改、改完好在哪）

  - id: "021"
    name: "团队点子归类法"
    category: "打磨完善创意"
    description: "把团队成员零散的点子分类整理、合并同类项，让讨论更聚焦"
    stepCount: 1
    steps:
      - name: "分类归并"
        prompt: |
          整理以下零散创意「{topic}」：

          **1. 分类**
          按核心思路的相似性分成 3-5 个类别，每类起一个名称。

          **2. 合并**
          同一类别内，把重复/相似的创意合并，保留最核心的表述。
          标注：合并了哪几条（用编号）。

          **3. 筛选**
          每个类别选出 1 个代表性方案。

          **4. 输出**
          一个清晰的分类清单，格式：
          > **类别 A**：[名称]
          > - 代表方案：[一句话]
          > - 包含的原始创意：[编号列表]
          > - 这个类别的潜力评估：[1-2句]

  - id: "022"
    name: "方案联姻法"
    category: "打磨完善创意"
    description: "把两个看似无关的方案强行结合，看 1+1 能不能产生化学反应"
    stepCount: 1
    steps:
      - name: "方案联姻"
        prompt: |
          从现有方案「{topic}」中选出 3 对能把彼此优势放大的组合。

          对每对组合：
          ### 联姻 X：方案 A × 方案 B
          - **A 的核心优势**：[1句]
          - **B 的核心优势**：[1句]
          - **结合后的新方案**：[3-5句，具体描述]
          - **为什么 1+1 > 2**：[2句]
          - **关键风险**：[1句]

  - id: "023"
    name: "跨界商业模式借鉴"
    category: "打磨完善创意"
    description: "参考其他行业的成功商业模式，把底层逻辑移植到你的领域"
    stepCount: 1
    steps:
      - name: "跨界模式"
        prompt: |
          从以下商业模式中选择 3 个最能帮到「{topic}」的：

          | 模式 | 核心逻辑 | 代表 |
          |------|---------|------|
          | 订阅制 | 按时收费、锁定复购 | Netflix |
          | 共享经济 | 闲置资源变现 | Airbnb |
          | 免费增值 | 免费拉新、高端付费 | Dropbox |
          | 平台模式 | 撮合供需双方 | 淘宝 |
          | 生态圈 | 多产品交叉锁定 | 小米 |
          | 按需服务 | 即用即付 | Uber |

          对每个选择的模式：
          - 为什么适合你的课题（2句）
          - 具体怎么移植（3-4句）
          - 移植后最大的挑战是什么

  - id: "024"
    name: "一句话展开法"
    category: "打磨完善创意"
    description: "把只有一句话的灵感快速展开成包含目标、受众、价值的完整方案"
    stepCount: 1
    steps:
      - name: "展开创意"
        prompt: |
          把一个简短想法「{topic}」展开成 3 个不同方向的完整方案。

          每个方向格式：
          ### 方向 X：[名称]
          - **一句话定位**
          - **目标用户**：谁最需要这个？
          - **核心价值**：解决了什么痛点？
          - **怎么赚钱**：谁付费？怎么定价？
          - **跟别人有什么不同**（2句）

          3 个方向要有明显差异（面向不同用户/不同场景/不同盈利模式）。

  - id: "025"
    name: "6W3H策划案法"
    category: "打磨完善创意"
    description: "用 9 个核心问题把模糊创意变成可直接评审的完整策划案"
    stepCount: 1
    steps:
      - name: "6W3H展开"
        prompt: |
          把创意「{topic}」用 6W3H 框架完整展开：

          | 维度 | 问题 | 你的回答 |
          |------|------|---------|
          | **What** 做什么 | 具体做什么？最终目标是什么？ | |
          | **Why** 为什么 | 为什么做？不做的代价是什么？ | |
          | **Who** 面向谁 | 核心用户是谁？谁会受影响？ | |
          | **Whom** 和谁合作 | 关键合作伙伴是谁？ | |
          | **Where** 在哪做 | 地域/渠道/平台？ | |
          | **When** 时间节点 | 启动、里程碑、截止日？ | |
          | **How** 怎么做 | 方法、流程、技术？ | |
          | **How much** 多少钱 | 预算、预期收入、盈亏点？ | |
          | **How many** 多大规模 | 用户数、产量、覆盖范围？ | |

          ⚠️ 每个维度必须有具体数字，不要"很多""大概""差不多"。

  - id: "026"
    name: "精益画布法"
    category: "打磨完善创意"
    description: "用精益画布框架快速生成创业企划书，包含客户/价值/收入等核心要素"
    stepCount: 1
    steps:
      - name: "填写精益画布"
        prompt: |
          用精益画布框架分析「{topic}」：

          | 模块 | 内容 |
          |------|------|
          | **问题** | 客户有哪 3 个最痛的痛点？ |
          | **客户细分** | 谁是你的目标客户？（要具体到能画像） |
          | **独特价值主张** | 一句话说清为什么选你不选别人 |
          | **解决方案** | 你怎么解决上面 3 个痛点？ |
          | **渠道** | 怎么触达客户？ |
          | **收入来源** | 怎么赚钱？几种收入？ |
          | **成本结构** | 主要成本是什么？ |
          | **关键指标** | 看什么数据知道做对了？ |
          | **壁垒** | 什么是别人抄不了的？ |

          ⚠️ 每个模块 2-4 句话，不要长篇大论但也不要用空话填。

  - id: "027"
    name: "可行性打分法"
    category: "打磨完善创意"
    description: "让 AI 当客观评审，从多个维度给方案打分（1-10），并给出评价理由"
    stepCount: 1
    steps:
      - name: "可行性评分"
        prompt: |
          作为客观的第三方评审，对方案「{topic}」打分：

          | 评判维度 | 分数(1-10) | 理由 |
          |---------|-----------|------|
          | 新颖度 | | 跟现有方案有什么不同？ |
          | 可行性 | | 技术/资源/时间够吗？ |
          | 市场吸引力 | | 有人愿意买单吗？ |
          | 竞争优势 | | 为什么你做比被人做强？ |
          | 扩展性 | | 做大了会不会更好？ |
          | **总分** | | |

          **综合判断**：
          - 🟢 可以推进（总分 > 42）
          - 🟡 需要调整再推进（30-42）
          - 🔴 建议重新思考（< 30）

          最后给出 3 条改进建议。

  - id: "028"
    name: "自身优势匹配法"
    category: "打磨完善创意"
    description: "验证方案是不是只有你能做——对照自身优势找出差异化竞争力"
    stepCount: 1
    steps:
      - name: "优势匹配"
        prompt: |
          针对方案「{topic}」，分析它跟"你"的匹配度：

          **1. 这个方案需要什么核心能力？**
          列出 5 项关键成功要素

          **2. 你的优势清单**
          列出你的独特优势（经验/资源/人脉/技能/认知）

          **3. 匹配分析**
          | 关键要素 | 你的匹配度 | 差距在哪 | 怎么补 |
          |---------|-----------|---------|--------|
          | 要素1 | 🟢🟡🔴 | | |
          | ... | | | |

          **4. 差异化策略**
          基于你的独特优势，如何把方案改得"只有你能做"？

  - id: "029"
    name: "利益相关方预演法"
    category: "打磨完善创意"
    description: "模拟你的方案推出后，各方（老板/客户/对手/监管）会有什么反应"
    stepCount: 1
    steps:
      - name: "各方反应预演"
        prompt: |
          假设方案「{topic}」正式推出，模拟各方的第一反应：

          | 利益方 | 会高兴吗？ | 具体反应（他们会说什么/做什么） | 你的应对策略 |
          |--------|-----------|------------------------------|------------|
          | 目标用户 | | | |
          | 竞争对手 | | | |
          | 合作伙伴 | | | |
          | 监管方 | | | |
          | 团队内部 | | | |
          | 投资人/老板 | | | |

          最后：如果只能优先"搞定"一个利益方，应该是谁？为什么？

  - id: "030"
    name: "风险全扫描法"
    category: "打磨完善创意"
    description: "系统性地找出方案中所有潜在风险和障碍，提前准备应对方案"
    stepCount: 1
    steps:
      - name: "风险扫描"
        prompt: |
          对方案「{topic}」进行全面风险扫描：

          | 风险类型 | 具体风险 | 概率(高/中/低) | 影响(大/中/小) | 应对策略 |
          |---------|---------|---------------|---------------|---------|
          | 技术风险 | | | | |
          | 市场风险 | | | | |
          | 财务风险 | | | | |
          | 人员风险 | | | | |
          | 政策风险 | | | | |
          | 竞争风险 | | | | |
          | 执行风险 | | | | |

          **优先级行动**：先处理"高概率+大影响"的 Top 3 风险。

  - id: "031"
    name: "魔鬼审阅法"
    category: "打磨完善创意"
    description: "模拟最挑剔的老板/投资人，把方案从头到脚挑刺一遍，提前找出所有漏洞"
    stepCount: 2
    steps:
      - name: "魔鬼挑刺"
        prompt: |
          你是一位极其严厉、以"挑刺"著称的高管。现在有一份方案摆在你面前：「{topic}」

          从以下 5 个角度无情挑刺（每个角度至少 2 条，要具体）：

          **1. 逻辑漏洞** — 因果链哪里断了？假设哪里站不住脚？
          **2. 可行性缺陷** — 预算/人力/时间哪里不现实？
          **3. 市场风险** — 对手会怎么反击？用户凭什么选你？
          **4. 执行障碍** — 落地过程最可能卡在哪步？
          **5. 隐藏假设** — 方案基于哪些未经验证的前提？

          语气要像真实的高管——直接、不留情面，但要言之有物。
          每个刺要扎得准，不能是泛泛的"这个不行"。
      - name: "改进应对"
        prompt: |
          针对上面的挑刺意见，为方案「{topic}」制定改进方案：

          **1. 逐条回应**
          把每个"不可行"的点转化为"已解决"的改进项

          **2. 优先解决 Top 3**
          选最致命的 3 个问题，详述解决方案

          **3. 改进后方案摘要**
          改完之后的方案是什么样？跟原版比好在哪？

  - id: "032"
    name: "原创性查重法"
    category: "打磨完善创意"
    description: "搜索已有类似方案，检测你的创意是不是真的原创，避免撞车"
    stepCount: 1
    steps:
      - name: "原创查重"
        prompt: |
          请检索你知识库中已有的类似方案，与「{topic}」对比：

          **1. 相似度清单**
          列出 5 个最接近的现有方案/产品/服务，评估相似度：

          | 现有方案 | 相似度(1-10) | 相似在哪 | 不同在哪 |
          |---------|------------|---------|---------|
          | | | | |

          **2. 差异化策略**
          你的方案跟它们最本质的区别是什么？
          这个区别对用户来说重要吗？

          **3. 如果高度相似**
          怎么调整才能做出明显差异化？
          给出 3 个方向。

  # ==========================================
  # 第三部分：落地执行创意（6条）
  # ==========================================

  - id: "033"
    name: "新闻发布稿法"
    category: "落地执行创意"
    description: "假设方案 3 年后大获成功，写一篇新闻稿。用成功的视角反推今天的策略"
    stepCount: 1
    steps:
      - name: "撰写新闻稿"
        prompt: |
          假设「{topic}」在 3 年后大获成功。请以正式新闻稿的格式撰写：

          **标题**：吸引眼球的新闻标题

          **副标题**：一句话概括核心成就

          **正文**：
          - 第1段：宣布成功消息，核心数据（用户数/营收/市场份额）
          - 第2段：一位真实用户的感言（引号内的原话）
          - 第3段：创始人的话——"3 年前我们刚开始的时候..."
          - 第4段：行业影响和未来展望

          写完后思考：这篇新闻稿里提到的成就，倒推到今天，第一步该做什么？

  - id: "034"
    name: "18个月财务预测"
    category: "落地执行创意"
    description: "让 AI 帮你做前 18 个月的收入/成本/利润预测，分保守/中等/乐观三档"
    stepCount: 1
    steps:
      - name: "财务预测"
        prompt: |
          为「{topic}」做 18 个月财务预测，分三档：

          | 月份 | 保守收入 | 中等收入 | 乐观收入 | 保守成本 | 中等成本 | 乐观成本 |
          |------|---------|---------|---------|---------|---------|---------|
          | M1-3 | | | | | | |
          | M4-6 | | | | | | |
          | M7-12 | | | | | | |
          | M13-18 | | | | | | |

          然后：
          - 保守/中等/乐观各自什么时候盈亏平衡？
          - 最大的成本项是什么？能怎么降？
          - 如果只能撑 6 个月，最该砍什么？

  - id: "035"
    name: "第一批客户获取法"
    category: "落地执行创意"
    description: "设计怎么找到第一批愿意买单的用户——从 0 到 1 的获客策略"
    stepCount: 1
    steps:
      - name: "获客策略"
        prompt: |
          为「{topic}」设计从 0 到 1 的获客策略：

          **1. 第一批用户画像**
          谁最可能最先买单？越具体越好（年龄/职业/痛点/在哪出现）

          **2. 找到他们的 5 个具体渠道**
          每个渠道说明：为什么他们在这？你怎么接触到他们？

          **3. 3 个钩子**
          用什么吸引他们第一次尝试？（免费试用？限量优惠？人带人？）

          **4. 前 100 个用户怎么变成推广者**
          他们凭什么帮你拉新？

          **5. 第一个月行动清单**
          每周做什么，做到多少算成功

  - id: "036"
    name: "30秒视频脚本生成"
    category: "落地执行创意"
    description: "为你的创意自动生成一个 30 秒短视频脚本，含分镜和画面描述"
    stepCount: 1
    steps:
      - name: "视频脚本"
        prompt: |
          为「{topic}」写一个 30 秒短视频脚本：

          **脚本结构**：
          - 0-5秒：**Hook**（一句话抓眼球，让人停下来不划走）
          - 5-25秒：**核心内容**（展示 3 个关键信息点）
          - 25-30秒：**CTA**（号召行动，关注/私信/购买）

          **分镜表**：
          | 时间 | 画面 | 旁白/字幕 | 音乐/音效 |
          |------|------|----------|----------|
          | 0-5s | [描述画面] | [文案] | [音效] |
          | ... | | | |

          **最后**：一句让人记住的 Slogan

  - id: "037"
    name: "最小验证法(POC)"
    category: "落地执行创意"
    description: "不全量投入，先设计一个小实验来验证核心假设到底成不成立"
    stepCount: 1
    steps:
      - name: "设计验证实验"
        prompt: |
          为「{topic}」设计一个最小可行性验证实验：

          **1. 核心假设**
          你最需要验证的 1 个假设是什么？
          （"如果这个假设是错的，整个方案就废了"的那个）

          **2. 实验设计**
          - 怎么做？[3-5句]
          - 需要多少预算？
          - 需要多长时间？
          - 需要多少人？

          **3. 成功标准**
          - 什么数据算验证通过？
          - 什么数据算验证失败？
          - 失败了怎么办？（备选方案）

          **4. 风险**
          - 实验本身最大的风险是什么？
          - 怎么避免实验结论误导你？

  - id: "038"
    name: "行动计划生成法"
    category: "落地执行创意"
    description: "把确认可行的方案变成具体的执行路线图——什么时候、谁、做什么"
    stepCount: 1
    steps:
      - name: "生成行动计划"
        prompt: |
          为「{topic}」制定详细行动计划：

          **时间线 + 里程碑**
          | 阶段 | 时间 | 目标 | 关键动作 | 负责人 | 资源需求 | 完成标志 |
          |------|------|------|---------|--------|---------|---------|
          | 1 | | | | | | |
          | 2 | | | | | | |
          | 3 | | | | | | |
          | 4 | | | | | | |

          **最容易出问题的 2 步**
          详细说明预防和应对方案

          **第一周日程表**
          周一到周日，每天做什么

  # ==========================================
  # 第四部分：找到思考切入点（18条）
  # ==========================================

  - id: "039"
    name: "解题要素分析法"
    category: "找到思考切入点"
    description: "先把解决课题需要的所有要素列清楚，再逐一诊断缺什么、去哪找"
    stepCount: 1
    steps:
      - name: "分析要素"
        prompt: |
          针对课题「{topic}」，列出解决问题的"必备要素清单"：

          **1. 要素列表**（知识/技术/人脉/资金/政策/时间/数据/...）
          每个要素标注：重要程度（必须/重要/加分）、目前够不够（够/不够/完全没有）

          **2. 差距分析**
          目前最缺的 3 个要素是什么？

          **3. 获取路径**
          每个缺的要素：去哪找？怎么找？需要多久？

  - id: "040"
    name: "障碍根因分析法"
    category: "找到思考切入点"
    description: "用'5 个为什么'深挖问题根本原因，不治标要治本"
    stepCount: 1
    steps:
      - name: "根因分析"
        prompt: |
          针对问题「{topic}」，用"5 个为什么"深挖到底：

          **Why 1**：表面问题是什么？
          **Why 2**：为什么会发生？
          **Why 3**：为什么没有被提前发现/预防？
          **Why 4**：为什么系统/流程允许它发生？
          **Why 5**：根本原因是什么？

          然后：
          - 治标的方案是什么？（快速止血）
          - 治本的方案是什么？（不再复发）
          - 两者需要什么不同的资源和时间？

  - id: "041"
    name: "社会问题解剖法"
    category: "找到思考切入点"
    description: "分析社会问题的结构：谁受影响、根源在哪、各因素之间怎么关联"
    stepCount: 1
    steps:
      - name: "社会问题解剖"
        prompt: |
          对社会问题「{topic}」进行系统性解剖：

          **1. 受影响人群**
          - 谁最受影响？（细分到具体群体）
          - 他们怎么描述自己的痛苦？（用他们的原话）

          **2. 因果网络**
          画一个因果链条（用文字描述）：
          根本原因 → 中间因素 → 直接原因 → 表面症状

          **3. 利益格局**
          - 谁在这个问题中获益？（有既得利益者吗？）
          - 谁有动力解决它？谁没有？

          **4. 你的切入点**
          这个网络中，哪个节点是你能撬动的？

  - id: "042"
    name: "国内外案例调研法"
    category: "找到思考切入点"
    description: "搜索国内外解决同类问题的成功案例和失败教训，站在前人肩膀上"
    stepCount: 1
    steps:
      - name: "案例调研"
        prompt: |
          针对课题「{topic}」，做一次全球案例调研：

          **1. 成功案例（3个）**
          | 案例 | 国家 | 什么做法 | 为什么成功 | 可借鉴的点 |
          |------|------|---------|-----------|----------|

          **2. 失败案例（2个）**
          | 案例 | 什么做法 | 为什么失败 | 教训 |
          |------|---------|-----------|------|

          **3. 中国适配性分析**
          这些国外经验到中国来，哪些能直接用？哪些要改？哪些完全不能用？

  - id: "043"
    name: "跨行业借鉴法"
    category: "找到思考切入点"
    description: "从完全不相关的行业里找解法——有时候隔壁领域的方案最适合你"
    stepCount: 1
    steps:
      - name: "跨行业借鉴"
        prompt: |
          为课题「{topic}」做跨行业思维移植：

          **1. 推荐 3 个值得借鉴的行业**
          不要选"看起来相关"的，选"看起来完全不相关但底层逻辑相似"的。

          **2. 每个行业的"可移植要素"**
          - 这个行业怎么解决类似问题？
          - 他们用的什么方法/工具/模式？
          - 移植到你这里需要怎么调？

          **3. 2-3 个具体的跨界方案**
          详述。

  - id: "044"
    name: "烦恼拆解法"
    category: "找到思考切入点"
    description: "把大烦恼按时间/空间/人际等维度拆成小问题，逐个击破"
    stepCount: 1
    steps:
      - name: "拆解烦恼"
        prompt: |
          把烦恼「{topic}」多维拆解：

          | 维度 | 拆解 | 对应的小问题 |
          |------|------|------------|
          | 时间 | 过去的遗留/现在的困难/未来的担忧 | |
          | 空间 | 在哪发生？换个环境会怎样？ | |
          | 人际 | 跟谁有关？关系是怎样的？ | |
          | 可控性 | 能改变的/只能接受的/不确定的 | |

          对每个"能改变的小问题"，给出 1 个解决建议。

  - id: "045"
    name: "烦恼根源挖掘法"
    category: "找到思考切入点"
    description: "深挖烦恼背后的核心痛点，找到真正的'病灶'再对症下药"
    stepCount: 1
    steps:
      - name: "挖掘根源"
        prompt: |
          针对烦恼「{topic}」：

          **1. 表面烦恼** — 你现在感觉到的是什么？

          **2. 深层恐惧** — 这个烦恼背后，你在怕什么？
          （通常是对失去控制/被否定/被抛弃/失败的恐惧）

          **3. 真实痛点** — 如果恐惧落实了，最坏的结果是什么？
          这个结果真的有那么糟吗？

          **4. 应对方案**
          - 预防：怎么降低它发生的概率？
          - 兜底：如果真的发生了，你能承受吗？有什么退路？
          - 转机：这个"最坏结果"有没有可能反而带来好处？

  - id: "046"
    name: "烦恼抽象化法"
    category: "找到思考切入点"
    description: "把具体烦恼抽象成通用问题，套用已有的解决框架"
    stepCount: 1
    steps:
      - name: "抽象化"
        prompt: |
          把烦恼「{topic}」抽象化处理：

          **1. 具体烦恼** → 抽象为通用问题
          格式："如何做 XXX？"

          **2. 通用问题** → 寻找已知解法
          这个问题在其他领域/行业/时代有被解决过吗？

          **3. 已知解法** → 适配回具体场景
          已知的解法怎么调到你的具体情况？

          给出 2-3 个适配方案。

  - id: "047"
    name: "用户困扰调研法"
    category: "找到思考切入点"
    description: "调研目标用户日常最困扰的事——需求藏在抱怨里"
    stepCount: 1
    steps:
      - name: "调研困扰"
        prompt: |
          对目标用户群体「{topic}」，列出他们日常的困扰：

          **1. 高频困扰清单**（至少 10 个）
          按频率排序（每天遇到/每周/每月）

          **2. 未被满足的需求**
          哪些困扰目前市场上没有好的解决方案？

          **3. 他们现在怎么凑合着解决？**
          （土办法/替代品/忍了）

          **4. 你的机会**
          选其中 2 个困扰，给出解决方案

  - id: "048"
    name: "不满清单法"
    category: "找到思考切入点"
    description: "站在顾客视角，列出他们对现有产品/服务所有不满的地方"
    stepCount: 1
    steps:
      - name: "不满清单"
        prompt: |
          针对「{topic}」，站在顾客的视角，列出让你不满的所有地方：

          **1. 不满清单（至少 15 条）**
          格式：`不满：... | 严重程度：⭐1-5 | 频率：每天/每次/偶尔`

          **2. 不满背后的真实需求**
          每个不满背后，顾客真正想要的是什么？

          **3. Top 5 不满的改进方案**
          优先改进高频+高严重度的

  - id: "049"
    name: "满意度杀手排查"
    category: "找到思考切入点"
    description: "找出是什么在悄悄降低用户满意度——那些'隐形杀手'"
    stepCount: 1
    steps:
      - name: "排查杀手"
        prompt: |
          针对「{topic}」的用户体验：

          **1. 满意度杀手清单**
          列出所有可能导致用户悄悄离开的因素（注意："悄悄"意味着他们不会说出来）

          **2. 影响矩阵**
          | 杀手 | 影响人数 | 影响程度 | 修复难度 | 优先级 |
          |------|---------|---------|---------|--------|

          **3. 快速修复清单**
          哪些能今天改？哪些需要一周？哪些需要一个月？

  - id: "050"
    name: "全方位满意度提升法"
    category: "找到思考切入点"
    description: "从产品/服务/情感/便利/价格 5 个角度全方位思考如何让用户更满意"
    stepCount: 1
    steps:
      - name: "满意度提升"
        prompt: |
          为「{topic}」制定全方位的满意度提升方案：

          | 维度 | 现状 | 改进方案 | 预期效果 | 成本 | 优先级 |
          |------|------|---------|---------|------|--------|
          | 产品 | | | | | |
          | 服务 | | | | | |
          | 情感 | | | | | |
          | 便利 | | | | | |
          | 价格 | | | | | |

          先做低成本高效果的改进，再做需要投入的。

  - id: "051"
    name: "核心需求提炼法"
    category: "找到思考切入点"
    description: "识别用户最看重的到底是什么——别在次要功能上浪费 80% 的时间"
    stepCount: 1
    steps:
      - name: "提炼核心需求"
        prompt: |
          针对「{topic}」的目标用户：

          **1. 需求清单**
          列出 10 个可能的用户需求

          **2. 需求排序**
          按"用户愿意为之付费的程度"排序（而不是用户嘴上说的重要程度）

          **3. 伪需求识别**
          哪些需求用户嘴上说重要但行为上根本不会买单？
          （凡是用户说"挺好的但我不掏钱"的，都是伪需求）

          **4. 聚焦建议**
          把 80% 精力放在哪 1-2 个需求上？

  - id: "052"
    name: "用户获得喜悦法"
    category: "找到思考切入点"
    description: "想象问题完美解决后用户有多开心——把这种'爽感'作为设计目标"
    stepCount: 1
    steps:
      - name: "描绘喜悦"
        prompt: |
          想象「{topic}」被完美解决后，用户的体验：

          **1. 情绪旅程**
          从"遇到问题"到"完美解决"，用户经历了怎样的情绪变化？
          焦虑→期待→惊喜→满足？还是其他？

          **2. 日常改变**
          问题解决后，用户的一天发生了什么具体的变化？
          （从早到晚，越细节越好）

          **3. 他们会怎么跟朋友说？**
          写一段用户向朋友推荐的口语化描述

          **4. 设计启示**
          这段"喜悦旅程"告诉你，产品/服务的设计重点应该放在哪里？

  - id: "053"
    name: "理想用户画像法"
    category: "找到思考切入点"
    description: "描绘最需要你解决方案的那个人——越具体越好，像写小说人物一样"
    stepCount: 1
    steps:
      - name: "用户画像"
        prompt: |
          为「{topic}」描绘一个活生生的理想用户：

          - **姓名/年龄/职业/收入**
          - **他/她的一天**（从起床到入睡，越细节越好）
          - **最大的痛苦**（用他/她的原话描述）
          - **目前的凑合方案**（怎么勉强应付的）
          - **如果能解决，生活会发生什么变化**
          - **他/她愿意花多少钱解决**
          - **在哪能找到他/她**（具体的线上/线下场所）

          写完后检查：这个画像是不是太泛了？能不能再具体一点？

  - id: "054"
    name: "最新趋势扫描法"
    category: "找到思考切入点"
    description: "了解你关注的领域最新的技术/趋势/玩法——站在风口上思考"
    stepCount: 1
    steps:
      - name: "趋势扫描"
        prompt: |
          扫描「{topic}」领域的最新趋势：

          **1. 热门趋势 Top 5**
          每个趋势标注：热度（🔥1-5）、持续性（短期/长期/永久）、可信度（高/中/低）

          **2. 信号 vs 噪音**
          哪些趋势是"真的在发生"？哪些只是"媒体在炒"？
          判断依据是什么？

          **3. 你的机会**
          如果现在开始借势，哪个趋势最适合你？怎么借？

  - id: "055"
    name: "趋势预判法"
    category: "找到思考切入点"
    description: "基于现有趋势推断未来走向——提前布局而不是追着趋势跑"
    stepCount: 1
    steps:
      - name: "趋势预判"
        prompt: |
          基于「{topic}」领域当前趋势：

          **1. 3-5 年后会发生什么？**
          给出 3 个具体预测

          **2. 信号追踪**
          如果你要验证自己的预测对不对，你会盯什么信号？
          （具体的数据、事件、人物）

          **3. 提前布局**
          如果你的预测是对的，今天应该开始准备什么？

          **4. 如果预测错了**
          最大的"意外"会是什么？怎么保证自己不被意外打垮？

  - id: "056"
    name: "百年后回望法"
    category: "找到思考切入点"
    description: "站在 100 年后回看今天——什么才是真正重要的？帮你跳出眼前的焦虑"
    stepCount: 1
    steps:
      - name: "百年回望"
        prompt: |
          假设现在是 2126 年。你是一个历史研究者，正在回顾 2026 年的人们如何处理「{topic}」这个问题。

          **1. 100 年后的评价**
          那时的人会怎么评价我们今天的做法？
          哪些被视为"先驱"，哪些被视为"愚蠢"？

          **2. 什么被证明是对的？什么被遗忘了？**
          今天我们纠结的事情，100 年后还重要吗？

