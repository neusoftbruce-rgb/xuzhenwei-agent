<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>徐振伟智能体</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg:#0f0f1a; --surface:#18182a; --border:#2a2a48;
  --text:#cdcde6; --text2:#7c7ca0;
  --accent:#7c5cfc; --accent2:#5b8def; --accent3:#4ecb71; --warn:#f0a050;
  --gemini-bg:#1e1e30; --gemini-radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Google Sans',-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;overflow:hidden;font-size:15px;line-height:1.6}

.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:all .25s}
.sidebar.hidden{width:0;min-width:0;padding:0;overflow:hidden;border-right:none;opacity:0}
.sidebar-hd{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-hd h2{font-size:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-hd .sub{font-size:10px;color:var(--text2)}
.sidebar-list{flex:1;overflow-y:auto;padding:8px 10px}
.sidebar-list::-webkit-scrollbar{width:3px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border)}
.cat{font-size:9px;color:var(--text2);letter-spacing:1.5px;padding:10px 0 3px 4px;font-weight:700;border-top:1px solid var(--border);margin-top:6px}
.cat:first-child{border-top:none;margin-top:0}
/* 可折叠分类 */
.cat-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px}
.cat-toggle::before{content:'▾';font-size:8px;transition:transform .2s}
.cat-group.folded .cat-toggle::before{transform:rotate(-90deg)}
.cat-group.folded .cat-body{display:none}
.cat-body{padding:0}
.s-item{display:flex;align-items:center;gap:6px;padding:6px 8px;margin:1px 0;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all .12s}
.s-item:hover{background:#1e1e38;color:var(--text)}
.s-item.on{background:rgba(124,92,252,.18);color:var(--accent2);font-weight:500}
.s-item.queued{background:rgba(240,160,80,.15);border:1px solid rgba(240,160,80,.3)}
.s-item .n{font-size:9px;background:#1e1e38;padding:1px 5px;border-radius:3px;flex-shrink:0}
.s-item.on .n{background:var(--accent);color:#fff}
.recipe-item{display:block;padding:6px 8px;margin:1px 0;border-radius:6px;cursor:pointer;font-size:11.5px;color:var(--text2);transition:all .12s}
.recipe-item:hover{background:#1e1e38;color:var(--text)}
.recipe-item.on{background:rgba(78,203,113,.1);color:var(--accent3);font-weight:500}

.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.topbar{height:52px;flex-shrink:0;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.topbar .logo{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.topbar h1{font-size:15px;font-weight:600}
.topbar .tag{font-size:9px;padding:2px 8px;border-radius:12px;background:rgba(240,160,80,.15);color:var(--warn)}
.topbar .btns{margin-left:auto;display:flex;gap:6px}
.topbar .btns button{padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap}
.topbar .btns button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.menu-btn{display:none;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:16px;cursor:pointer}

.chat{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.welcome{text-align:center;padding:24px}
.welcome .icon{font-size:40px;margin-bottom:10px}
.welcome h2{font-size:18px;margin-bottom:6px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--text2);font-size:13px;line-height:1.7}

.msg{max-width:85%;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.ai,.msg.reason,.msg.recommend{align-self:flex-start}
.msg.sys{align-self:center;max-width:70%}

.msg .b{padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.7;word-break:break-word;position:relative}
.msg.user .b{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px}
.msg.ai .b{background:var(--gemini-bg);border:1px solid var(--border);border-radius:var(--gemini-radius);border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.msg.sys .b{background:transparent;color:var(--text2);font-size:11px;text-align:center;padding:4px}
.msg.reason .b{background:#16142a;border:1px solid rgba(240,160,80,.2);border-left:3px solid var(--warn);font-size:12px;border-radius:8px}
.msg.reason .b::before{content:"🧠 思考中...";display:block;font-size:10px;color:var(--warn);margin-bottom:6px;font-weight:600;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
.msg.ai.final,.msg.ai.refined{background:transparent}
.msg.ai.refined .b{background:rgba(78,203,113,.04);border-color:rgba(78,203,113,.18);border-radius:var(--gemini-radius);box-shadow:0 2px 8px rgba(78,203,113,.06)}
.msg.ai.final .b::before{content:"🎯 分析结果";display:block;font-size:10px;color:var(--accent3);margin-bottom:6px;font-weight:600}

/* 推荐卡片气泡 */
.msg.recommend .b{background:rgba(124,92,252,.04);border:1px solid rgba(124,92,252,.25);padding:14px 16px}
.msg.recommend .b::before{content:"🧠 分析你的问题...";display:block;font-size:10px;color:var(--accent);margin-bottom:8px;font-weight:600;letter-spacing:1px}
.rec-keywords{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.rec-keywords span{font-size:9px;padding:2px 6px;border-radius:10px;background:rgba(124,92,252,.15);color:var(--accent2)}
.rec-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
@media(max-width:600px){.rec-cards{grid-template-columns:1fr}}
.rec-card{display:flex;flex-direction:column;gap:4px;padding:10px 12px;border-radius:10px;background:#1e1e38;border:1px solid var(--border);font-size:12px;cursor:pointer;transition:all .15s}
.rec-card:hover{border-color:var(--accent);background:#222244}
.rec-card .rc-hd{display:flex;align-items:center;gap:6px}
.rec-card .rc-id{font-size:10px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.rec-card .rc-info{flex:1;min-width:0}
.rec-card .rc-name{font-weight:600;font-size:13px}
.rec-card .rc-desc{font-size:10px;color:var(--text2);line-height:1.5;margin-top:2px}
.rec-card .rc-reason{font-size:9px;color:var(--accent2);margin-top:1px;font-style:italic}
.rec-card .rc-pct{font-size:12px;font-weight:700;color:var(--accent2);flex-shrink:0}
.rec-card.top{border-color:rgba(240,160,80,.3);background:rgba(240,160,80,.05)}
.rec-card.top .rc-id{background:var(--warn)}
.rec-card.top .rc-pct{color:var(--warn)}
/* 批量进度条 */
.batch-progress{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.batch-progress .fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s}
.rec-actions{display:flex;gap:6px}
.rec-actions button{padding:6px 14px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600;border:none}
.btn-go{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-recipe{background:var(--accent3);color:#000}
.btn-swap{background:transparent;border:1px solid var(--border)!important;color:var(--text2)}

/* 导出按钮——在气泡右上角 */
.export-btn{position:absolute;top:8px;right:10px;padding:3px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:10px;cursor:pointer;display:none;z-index:5}
.msg .b:hover .export-btn{display:block}
.export-btn:hover{border-color:var(--accent3);color:var(--accent3)}
.export-menu{position:absolute;top:28px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px;display:none;z-index:10;min-width:120px;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.export-menu.show{display:block}
.export-menu button{display:block;width:100%;padding:6px 10px;border:none;background:transparent;color:var(--text);font-size:11px;cursor:pointer;text-align:left;border-radius:4px}
.export-menu button:hover{background:var(--accent);color:#fff}

.msg .b h1,.msg .b h2,.msg .b h3{margin:8px 0 4px}
.msg .b h2{font-size:15px;color:var(--accent2);border-bottom:1px solid var(--border);padding-bottom:3px}
.msg .b h3{font-size:13px;color:var(--accent2)}
.msg .b strong{color:#a0a0ff}
.msg .b ul,.msg .b ol{margin:5px 0;padding-left:18px}
.msg .b li{margin:1px 0}
.msg .b blockquote{border-left:2px solid var(--accent);margin:6px 0;padding:3px 12px;color:var(--text2);background:rgba(124,92,252,.04);border-radius:0 5px 5px 0}
.msg .b code{background:var(--surface);padding:1px 5px;border-radius:3px;font-size:11px}
.msg .b hr{border:none;border-top:1px solid var(--border);margin:8px 0}
.msg .b p{margin:3px 0}
.msg .b table{border-collapse:collapse;width:100%;margin:8px 0;font-size:11px}
.msg .b th,.msg .b td{border:1px solid var(--border);padding:4px 8px;text-align:left}
.msg .b th{background:var(--surface)}
/* 技法标签 */
.tech-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:8px}
.tech-badge.method{background:rgba(124,92,252,.2);color:var(--accent)}
.tech-badge.recipe{background:rgba(78,203,113,.2);color:var(--accent3)}

.typing{display:flex;gap:3px;padding:3px 0}
.typing span{width:4px;height:4px;background:var(--warn);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{opacity:.2;transform:translateY(0)}40%{opacity:1;transform:translateY(-4px)}}

.input-zone{flex-shrink:0;padding:10px 16px 14px;background:var(--surface);border-top:1px solid var(--border)}
.input-tools{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}
/* 文件按钮 */
.fbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--accent);color:var(--text)}
.fbtn.file{border-color:rgba(124,92,252,.3);color:var(--accent)}
.fbtn.folder{border-color:rgba(91,141,239,.3);color:var(--accent2)}
.fbtn .icon{font-size:13px}
.fbtn.file,.fbtn.folder{position:relative;overflow:hidden}
.fbtn input[type=file]{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}

.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row textarea{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:#1e1e38;color:var(--text);font-size:14px;font-family:inherit;line-height:1.5;resize:none;outline:none;min-height:44px;max-height:150px}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--text2);font-size:13px}
.btn-send{padding:10px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:14px;font-weight:600;cursor:pointer;flex-shrink:0}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.hint{font-size:10px;color:var(--text2);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}

.file-toast{position:fixed;bottom:80px;right:20px;background:var(--surface);border:1px solid var(--accent3);border-radius:10px;padding:8px 14px;font-size:11px;color:var(--accent3);z-index:150;animation:fadeIn .3s;max-width:300px}
/* 文件标签列表 */
.file-tags{display:none;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.file-tag{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.25);font-size:11px;color:var(--accent2);animation:fadeIn .2s}
.ft-name{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ft-size{color:var(--text2);font-size:10px;flex-shrink:0}
.ft-del{cursor:pointer;color:var(--text2);font-size:13px;line-height:1;padding:0 3px;border:none;background:none;flex-shrink:0;border-radius:3px}
.ft-del:hover{color:#f05050;background:rgba(240,80,80,.1)}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;transform:translateX(-100%);box-shadow:0 4px 24px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:block}
  .topbar h1{font-size:14px}
  .topbar .tag{display:none}
  .msg{max-width:95%}
  .chat{padding:10px 12px}
  .msg .b{font-size:12.5px;padding:8px 12px}
  .input-zone{padding:8px 10px 12px}
  .input-row textarea{font-size:13px;min-height:40px}
  .btn-send{padding:9px 16px;font-size:13px}
}
.s-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.s-overlay.show{display:block}
/* 侧边栏浮动切换标签 */
.sidebar-tab{display:none;position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:200;background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 8px 8px 0;padding:16px 6px;cursor:pointer;writing-mode:vertical-rl;font-size:11px;color:var(--text2);letter-spacing:2px;transition:all .2s}
.sidebar-tab:hover{background:var(--accent);color:#fff;padding-left:10px}
.sidebar.hidden ~ .sidebar-tab{display:block}
</style>
</head>
<body>
<div class="s-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-hd"><h2>🧠 分析模式</h2><div class="sub">AI 深度思考引擎</div></div>
  <div class="sidebar-list">
    <div class="cat">对话模式</div>
    <div class="recipe-item" data-id="" onclick="setMode('','自由对话',this)">💬 自由对话</div>
    <div class="recipe-item" data-id="auto" onclick="setMode('auto','智能推荐',this)">🤖 智能推荐</div>
    <div class="recipe-item on" data-id="consulting" onclick="setMode('consulting','🏛️ 咨询式分析',this)" style="border:1px dashed rgba(240,160,80,.3);margin-top:4px">🏛️ 咨询式分析</div>
    <div class="cat">配方套餐</div>
    <div class="recipe-item" data-id="recipe:创业验证套餐" onclick="setMode('recipe:创业验证套餐','创业验证',this)">📦 创业验证</div>
    <div class="recipe-item" data-id="recipe:内容创作套餐" onclick="setMode('recipe:内容创作套餐','内容创作',this)">📦 内容创作</div>
    <div class="recipe-item" data-id="recipe:客户获取套餐" onclick="setMode('recipe:客户获取套餐','客户获取',this)">📦 客户获取</div>
    <div class="recipe-item" data-id="recipe:战略规划套餐" onclick="setMode('recipe:战略规划套餐','战略规划',this)">📦 战略规划</div>
    <div class="recipe-item" data-id="recipe:提案打磨套餐" onclick="setMode('recipe:提案打磨套餐','提案打磨',this)">📦 提案打磨</div>
    <div class="recipe-item" data-id="recipe:农业品牌套餐" onclick="setMode('recipe:农业品牌套餐','农业品牌',this)">📦 农业品牌</div>
    <div class="recipe-item" data-id="recipe:深度诊断套餐" onclick="setMode('recipe:深度诊断套餐','深度诊断',this)">📦 深度诊断</div>
    <div class="cat">🌾 农业混合工作流</div>
    <div class="recipe-item" data-id="recipe:农技推广：发现翻译传播" onclick="setMode('recipe:农技推广：发现翻译传播','农技推广',this)">🌱 农技推广流</div>
    <div class="recipe-item" data-id="recipe:课程开发：策划验证迭代" onclick="setMode('recipe:课程开发：策划验证迭代','课程开发',this)">📋 课程开发流</div>
    <div class="recipe-item" data-id="recipe:农场诊断：把脉开方跟诊" onclick="setMode('recipe:农场诊断：把脉开方跟诊','农场诊断',this)">🏥 农场诊断流</div>
    <div class="recipe-item" data-id="recipe:农业品牌：洞察定位内容" onclick="setMode('recipe:农业品牌：洞察定位内容','农业品牌',this)">🏷️ 品牌打造流</div>
    <div class="recipe-item" data-id="recipe:学员养成：学练考用闭环" onclick="setMode('recipe:学员养成：学练考用闭环','学员养成',this)">🎮 学员养成流</div>
    <div class="cat">56技法 <span style="font-weight:400;color:var(--text2);font-size:9px">点击即用</span></div>
    <div id="techList"></div>
    <div class="cat">🤖 AI独学50TIPS <span style="font-weight:400;color:var(--text2);font-size:9px">v4.0新增</span></div>
    <div id="tipsList"></div>
  </div>
</aside>
<div class="sidebar-tab" onclick="openSidebar()" title="展开技法面板">🔧 技法库</div>

<main class="main">
  <header class="topbar">
    <button class="menu-btn" onclick="openSidebar()">☰</button>
    <div class="logo">🌱</div>
    <h1>徐振伟智能体</h1>
    <span class="tag" id="statusTag">🧠 深度思考</span>
    <div class="btns">
      <button id="fastBtn" onclick="toggleFast()">⚡ 快速</button>
    </div>
  </header>

  <div class="chat" id="chat">
    <div class="welcome"><div class="icon">🤖</div><h2>你好，我是徐振伟</h2><p>默认深度思考 · 智能推荐技法<br>输入问题，我会先告诉你用什么技法分析</p></div>
  </div>

  <div class="input-zone">
    <div class="input-tools">
      <label class="fbtn file">
        <span class="icon">📁</span> 选择文件
        <input type="file" multiple accept=".md,.txt,.csv,.json,.xml,.yml,.yaml,.html,.log,.java,.py,.js,.ts,.css,.pdf" onchange="handleFiles(this.files)">
      </label>
      <label class="fbtn folder">
        <span class="icon">📂</span> 选择文件夹
        <input type="file" webkitdirectory directory multiple onchange="handleFiles(this.files)">
      </label>
      <button class="fbtn" onclick="smartPreAnalyze()" style="border-color:rgba(78,203,113,.4);color:var(--accent3)" title="分析内容复杂度，自动推荐N个技法">
        <span>🔬</span> 智能预分析
      </button>
      <span id="intakeResult" style="font-size:10px;color:var(--text2)"></span>
    </div>
    <div class="file-tags" id="fileTags"></div>
    <div id="batchBar" style="display:none;padding:6px 10px;background:rgba(240,160,80,.06);border:1px solid rgba(240,160,80,.2);border-radius:8px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:10px;color:var(--warn);font-weight:600;white-space:nowrap">📋 队列:</span>
        <span id="batchTags" style="display:flex;gap:4px;flex-wrap:wrap;flex:1"></span>
        <button id="batchGoBtn" onclick="executeBatch()" style="padding:5px 14px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--warn),#e08030);color:#000;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">▶ 全部执行</button>
        <button onclick="clearQueue()" style="padding:4px 10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;cursor:pointer">✕</button>
      </div>
      <div id="batchProgressBar" class="batch-progress" style="display:none"><div class="fill" style="width:0%"></div></div>
    </div>
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="输入问题… Shift+Enter 换行  Enter 发送"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="send()">发送</button>
      <button class="btn-send" id="stopBtn" onclick="stopGeneration()" style="display:none;background:#f05050">⏹ 停止</button>
    </div>
    <div class="hint"><span>Enter 发送</span><span>Shift+Enter 换行</span><span>📁 可选文件</span><span>＋加入队列</span></div>
  </div>
</main>

<script>
let mode='auto', fastMode=false, streaming=false, currentTechLabel='', retryCount=0;
let abortController=null, inputHistoryPos=-1, inputHistoryArr=[], _initDone=false;
let currentSessionId='', techNameMap={}; // v3.0 fix: 全局会话ID和技法名称映射
let refreshRound=0, seenTechniqueIds=[], prevCategories=[]; // v3.2: 多策略换一批追踪

// 加载技法列表——按分类展示，不显示数量
const CAT_DESC={
  '快速产生灵感':'没有思路时从这里开始——用AI独特能力、自由联想、逻辑推理快速产生新点子',
  '打磨完善创意':'已经有了初步想法？让AI帮你筛选、深化、具体化、验证',
  '落地执行创意':'方案已成型——转化为传播策略、财务预测、行动计划',

};
const CAT_ICON={

  '打磨完善创意':'🔧',
  '落地执行创意':'🚀',
  '找到思考切入点':'🔍'
};

    {name:'用AI特有力量思考',ids:['001','002','003','004','005','006']},
    {name:'用自由发想思考',ids:['007','008','009','010','011','012']},
    {name:'用逻辑发想思考',ids:['013','014','015','016','017']}
  ],
  '打磨完善创意':[
    {name:'让思考发展',ids:['018','019','020','021','022','023']},
    {name:'让思考具体化',ids:['024','025','026']},
    {name:'让思考验证',ids:['027','028','029','030','031','032']}
  ],
  '落地执行创意':[
    {name:'思考传播方式',ids:['033','034','035','036']},
    {name:'思考执行策略',ids:['037','038']}
  ],
  '找到思考切入点':[
    {name:'分析课题得启示',ids:['039','040','041','042','043']},
    {name:'分析烦恼得启示',ids:['044','045','046']},
    {name:'分析人得启示',ids:['047','048','049','050','051','052','053']},
    {name:'预测未来得启示',ids:['054','055','056']}

fetch('/api/techniques').then(r=>r.json()).then(techs=>{
  const list=document.getElementById('techList');
  if(!list)return;
  const byId={};techs.forEach(t=>{byId[t.id]=t; techNameMap[t.id]={id:t.id,name:t.name};}); // v3.0: 全局技法名映射
  const categories=['快速产生灵感','打磨完善创意','落地执行创意','找到思考切入点'];
  categories.forEach(cat=>{

    catGroup.className='cat-group';
    const catHd=document.createElement('div');

    const catDesc=document.createElement('div');

    const chapters=CAT_CHAPTERS[cat]||[];

        el.title=t.description;
        el.innerHTML='<span class="n" style="cursor:pointer" title="＋加入批量队列">＋</span> '+t.name+' <span style="font-size:9px;color:var(--text2);margin-left:auto">'+t.id+'</span>';
        el.querySelector('.n').onclick=function(e){e.stopPropagation();toggleBatchQueue(t.id,t.name)};
        el.onclick=()=>{setMode(t.id,t.name,el);closeSidebar()};
        catBody.appendChild(el);
      });
    });
    catGroup.appendChild(catBody);
    list.appendChild(catGroup);
  });
});

// ---- 加载 AI独学 50TIPS 到侧边栏 ----
fetch('/api/techniques').then(r=>r.json()).then(techs=>{
  const tipsList=document.getElementById('tipsList');
  if(!tipsList)return;
  const tips=techs.filter(t=>t.id&&t.id.startsWith('TIPS-'));
  if(!tips.length){tipsList.innerHTML='<div style="font-size:10px;color:var(--text2);padding:6px">加载中...</div>';return}
  const tipsCats=['AI独学-超具体化','AI独学-输出深化','AI独学-机制化'];
  tipsCats.forEach(cat=>{
    const catTips=tips.filter(t=>t.category===cat);
    if(!catTips.length)return;
    const shortName=cat.replace('AI独学-','');

    catGroup.className='cat-group folded';
    const catHd=document.createElement('div');

    catHd.innerHTML='📘 '+shortName+' <span style="font-weight:400;font-size:9px;color:var(--text2)">'+catTips.length+'个</span>';
    catHd.onclick=function(){this.parentElement.classList.toggle('folded')};
    catGroup.appendChild(catHd);
    const catBody=document.createElement('div');
    catBody.className='cat-body';
    catTips.forEach(t=>{
      const el=document.createElement('div');
      el.className='s-item';
      el.dataset.id=t.id;
      el.title=t.description||'';
      el.innerHTML='<span class="n" style="background:#1e3a5c;font-size:8px;cursor:pointer" title="＋加入批量队列">＋</span> '+t.name+' <span style="font-size:9px;color:var(--text2);margin-left:auto">'+t.id+'</span>';
      el.querySelector('.n').onclick=function(e){e.stopPropagation();toggleBatchQueue(t.id,t.name)};
      el.onclick=()=>{setMode(t.id,t.name,el);closeSidebar()};
      catBody.appendChild(el);
    });
    catGroup.appendChild(catBody);
    tipsList.appendChild(catGroup);
  });
});

function setMode(id,label,el){mode=id;document.querySelectorAll('.s-item,.recipe-item').forEach(e=>e.classList.remove('on'));if(el)el.classList.add('on');
  const tag=document.getElementById('statusTag');
  if(fastMode)tag.innerHTML='⚡ 快速模式';
  else if(id==='')tag.innerHTML='💬 自由对话';
  else if(id==='auto')tag.innerHTML='🤖 智能推荐';
  else if(id&&id.startsWith('recipe:'))tag.innerHTML='📦 '+label;
  else if(id&&id.startsWith('TIPS-'))tag.innerHTML='📘 独学TIPS '+id;
  else if(id)tag.innerHTML='🔧 技法 '+id+' · '+label;
  const old=document.getElementById('modeNotice');if(old)old.remove();
  if(id&&id!=='auto'){const n=document.createElement('div');n.id='modeNotice';n.style.cssText='text-align:center;padding:6px;margin:4px 0;font-size:11px;color:var(--accent2);background:rgba(124,92,252,.08);border-radius:8px';n.innerHTML='✅ 当前模式: <b>'+label+'</b> ['+id+'] — 输入问题后直接执行';document.getElementById('chat').appendChild(n);scrollDown()}
  }
function toggleFast(){fastMode=!fastMode;const b=document.getElementById('fastBtn');const tag=document.getElementById('statusTag');
  b.classList.toggle('on',fastMode);
  b.innerHTML=fastMode?'<span style="color:#f0a050">⚡</span> 快速开':'⚡ 快速';
  tag.innerHTML=fastMode?'⚡ 快速模式':'🧠 深度思考';
  tag.style.background=fastMode?'rgba(240,160,80,.15)':'';
  tag.style.color=fastMode?'var(--warn)':'';}
function openSidebar(){
  const sb=document.getElementById('sidebar'),ov=document.getElementById('overlay');
  if(window.innerWidth<=768){
    sb.classList.add('open');ov.classList.add('show');
  } else {
    sb.classList.toggle('hidden');
    ov.classList.toggle('show',sb.classList.contains('hidden'));
  }
}
function closeSidebar(){
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
  }
  document.getElementById('overlay').classList.remove('show');
}

// ====== 文件处理 ======
const MAX_FILE_SIZE=5*1024*1024, MAX_FILE_COUNT=10, MAX_CHARS=80000;
let pendingFiles=[];
function showToast(m,e){const t=document.createElement('div');t.className='file-toast';t.textContent=m;if(e)t.style.color='#f0a050';document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}

function handleFiles(fileList){
  if(!fileList||fileList.length===0)return;
  const files=Array.from(fileList);
  const big=files.filter(f=>f.size>MAX_FILE_SIZE);
  if(big.length)showToast('⚠️ '+big.length+'个文件超5MB已跳过',true);
  const valid=files.filter(f=>f.size<=MAX_FILE_SIZE);
  if(!valid.length)return;
  const slots=MAX_FILE_COUNT-pendingFiles.length;
  if(slots<=0){showToast('⚠️ 最多'+MAX_FILE_COUNT+'个文件',true);return}
  if(valid.length>slots){showToast('⚠️ 最多'+MAX_FILE_COUNT+'个，只保留前'+slots+'个',true);valid.splice(slots)}
  valid.forEach(f=>pendingFiles.push({name:f.name,size:f.size,file:f}));
  renderFileTags();updateSendBtn();
}

function renderFileTags(){
  const c=document.getElementById('fileTags');if(!c)return;
  c.innerHTML=pendingFiles.map((f,i)=>
    '<span class="file-tag"><span class="ft-name" title="'+f.name+'">📄 '+f.name+'</span><span class="ft-size">'+(f.size/1024).toFixed(1)+'KB</span><button class="ft-del" onclick="removeFile('+i+')" title="移除">✕</button></span>'
  ).join('');
  c.style.display=pendingFiles.length?'flex':'none';
}

function removeFile(i){pendingFiles.splice(i,1);renderFileTags();updateSendBtn()}

async function readFilesContent(files){
  let all='';
  for(const f of files){try{const t=await f.file.text();all+='\n=== '+f.name+' ===\n'+(t.length>15000?t.substring(0,15000)+'\n...(截断)':t)+'\n';if(all.length>MAX_CHARS){all=all.substring(0,MAX_CHARS)+'\n(超限截断)';break}}catch(e){all+='\n=== '+f.name+' ===\n[失败:'+e.message+']\n'}}
  return all;
}

// ====== 发送消息 ======
async function send(){
  const input=document.getElementById('userInput'), text=input.value.trim();
  if((!text&&!pendingFiles.length)||streaming)return;
  if(handleQuickCmd(text)){input.value='';input.style.height='auto';pushInput(text);return;}
  const chat=document.getElementById('chat');const w=chat.querySelector('.welcome');if(w)w.remove();

  let fileContent='';let filesSnapshot=[];
  if(pendingFiles.length){
    filesSnapshot=[...pendingFiles];
    pendingFiles=[];renderFileTags();updateSendBtn();
    fileContent=await readFilesContent(filesSnapshot);
  }

  if(!currentSessionId)currentSessionId='web_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  input.value='';input.style.height='auto';streaming=true;
  pushInput(text);abortController=new AbortController();
  document.getElementById('sendBtn').disabled=true;showStopBtn();

  let displayText=text||'(文件分析)';
  if(filesSnapshot.length){
    const names=filesSnapshot.length<=3?filesSnapshot.map(f=>f.name).join(', '):filesSnapshot.length+' 个文件';
    displayText='📁 '+names+(text?'\n'+text:'');
  }
  addMsg('user',displayText);

  let fullText=text||'请分析以下文件内容';
  if(fileContent)fullText='以下是我上传的文件内容:\n'+fileContent+'\n---\n请根据以上文件内容，回答:\n'+fullText;

  // ====== 咨询模式 ======
  if(mode==='consulting'){
    addMsg('sys','🏛️ <b>咨询式分析</b> — 全景快扫中...');
    const aiMsg=addMsg('ai','<div class="typing"><span></span><span></span><span></span></div>');
    streaming=true;abortController=new AbortController();showStopBtn();
    try{
      await streamToMsg('/api/agent/consulting/scan',{message:fullText,deepThink:false},aiMsg);
      var bubble=aiMsg.querySelector('.b');
      if(bubble){
        var encodedQ=btoa(unescape(encodeURIComponent(fullText)));
        bubble.innerHTML=bubble.innerHTML.replace(/<h3>维度(\d+)[：:]([^<]+)<\/h3>/gi,function(m,num,dimName){
          var dim=dimName.replace(/<[^>]+>/g,'').trim();
          var encodedDim=btoa(unescape(encodeURIComponent(dim)));
          return '<div style="display:flex;align-items:center;gap:8px;margin:10px 0 4px"><b style="flex:1;font-size:14px;color:var(--accent2)">维度'+num+': '+dim+'</b><button onclick="consultingDeepDive(\''+encodedQ+'\',\''+encodedDim+'\',this)" style="padding:4px 12px;border-radius:12px;border:1px solid var(--warn);background:rgba(240,160,80,.1);color:var(--warn);font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600">🔍 深挖</button></div>';
        });
      }
    }catch(e){if(!aiMsg.querySelector('.b')?.textContent?.trim())aiMsg.querySelector('.b').innerHTML='<span style="color:#f05050">❌ 咨询分析失败: '+(e.message||'未知错误')+'</span>'}
    finish(aiMsg);return;
  }

  // 手动选技法或配方
  if(mode&&mode!=='auto'&&mode!=='consulting'&&!mode.startsWith('recipe:')){
    const sideEl=document.querySelector('.s-item[data-id="'+mode+'"]');
    const techName=sideEl?sideEl.textContent.trim():('技法'+mode);
    currentTechLabel=techName;
    addMsg('sys','🔧 正在使用: <b>'+techName+'</b> 分析中...');
    const aiMsg=addMsg('ai','<div class="typing"><span></span><span></span><span></span></div>');
    await streamWithRetry('/api/agent/think',{message:fullText,techniqueId:mode,deepThink:!fastMode},aiMsg);
    finish(aiMsg);return;
  }
  if(mode&&mode.startsWith('recipe:')){
    const label=mode.replace('recipe:','');
    addMsg('sys','📦 正在使用配方: <b>'+label+'</b> 执行中...');
    currentTechLabel='📦 '+label;
    const aiMsg=addMsg('ai','<div class="typing"><span></span><span></span><span></span></div>');
    await streamWithRetry('/api/agent/think',{message:fullText,techniqueId:mode,deepThink:!fastMode},aiMsg);
    finish(aiMsg);return;
  }

  // ═══════════ v3.0 方法9: 缓存检查 ═══════════
  var cacheHit=null;
  try{
    var cr=await fetch('/api/agent/cache-check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:fullText})});
    var cd=await cr.json();
    if(cd.hit){
      cacheHit=cd;
      addMsg('sys','📋 之前分析过类似问题「'+cd.originalQuestion+'」(技法: '+cd.techniqueName+')，要复用结果吗？<button onclick="document.getElementById(\'userInput\').value=\'继续分析: '+cd.originalQuestion.replace(/'/g,"\\'")+'\';send()" style="margin-left:6px;padding:2px 10px;border-radius:10px;border:1px solid var(--accent3);background:transparent;color:var(--accent3);cursor:pointer;font-size:10px">✅ 复用</button>');
    }
  }catch(e){}

  // ═══════════ v3.0: 透明推荐流程（置信度路由+意图显示+智能追问）═══════════
  let recData;
  try{
    if(retryCount>0){
      try{
        const dr=await fetch('/api/recommend/deep',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:fullText})});
        const deepText=await dr.text();
        const r2=await fetch('/api/recommend/quick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:fullText,shuffle:'true'})});
        recData=await r2.json();
        recData.explanation=deepText;
      }catch(e){recData=null;}
      retryCount=0;
    }else{
      const r=await fetch('/api/recommend/quick',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:fullText})});
      recData=await r.json();
    }
  }catch(e){recData=null;retryCount=0;}

  // 方法3: 置信度路由 — topConfidence>=90 自动执行
  var topConfidence=recData&&recData.cards&&recData.cards.length>0?recData.cards[0].confidence:0;
  var topId=recData&&recData.cards&&recData.cards.length>0?recData.cards[0].id:'003';
  var topName=recData&&recData.cards&&recData.cards.length>0?recData.cards[0].name:'';

  if(topConfidence>=90){
    addMsg('sys','🎯 高置信度匹配('+topConfidence+'%)，自动执行<b>'+topName+'</b>');
    document.querySelectorAll('.s-item,.recipe-item').forEach(function(e){e.classList.remove('on')});
    var sideEl=document.querySelector('.s-item[data-id="'+topId+'"]');
    if(sideEl)sideEl.classList.add('on');
    currentTechLabel=topName;
    document.getElementById('statusTag').innerHTML='🔧 '+topName;
    var aiMsg=addMsg('ai','<div class="typing"><span></span><span></span><span></span></div>');
    streaming=true;abortController=new AbortController();showStopBtn();
    await streamWithRetry('/api/agent/think',{message:fullText,techniqueId:topId,deepThink:!fastMode},aiMsg);
    finish(aiMsg);return;
  }

  // 80-89%/50-79%/<50%: 展示卡片
  var confLevel=topConfidence>=80?'high':(topConfidence>=50?'mid':'low');
  const recMsg=addMsg('recommend','');
  const b=recMsg.querySelector('.b');
  let html='';

  // 意图标签(方法1)
  if(recData&&recData.intent){
    html+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    html+='<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(91,141,239,.15);color:var(--accent2)">🎯 '+recData.intent.label+'</span>';
    if(recData.complexity)html+='<span style="font-size:10px;color:var(--text2)">'+recData.complexity.label+' · '+recData.complexity.recommendCount+'条</span>';
    html+='</div>';
  }

  if(recData&&recData.keywords&&recData.keywords.length){
    html+='<div class="rec-keywords">'+recData.keywords.map(k=>'<span>'+k+'</span>').join('')+'</div>';
  }

  html+=recData&&recData.explanation?'<div style="font-size:12px;color:var(--text2);margin-bottom:4px">'+recData.explanation+'</div>':'';
  if(recData&&recData.complexity){
    html+='<div style="font-size:10px;color:var(--text2);margin-bottom:6px">📊 复杂度: <b style="color:var(--accent2)">'+recData.complexity.label+'</b> · 推荐'+recData.complexity.recommendCount+'条 · ⚡纯本地引擎</div>';
  }
  // v3.1: MECE覆盖计划显示
  if(recData&&recData.mece&&recData.mece.phases&&recData.mece.phases.length){
    html+='<div style="font-size:10px;color:var(--text2);margin-bottom:10px;padding:6px 10px;background:rgba(78,203,113,.04);border-radius:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
    html+='<span style="color:var(--accent3);font-weight:600">'+ (recData.mece.isComplete?'✅ 四阶段闭环':'⚠️ 部分覆盖') +'</span>';
    recData.mece.phases.forEach(function(p){
      html+='<span style="padding:1px 8px;border-radius:8px;background:rgba(124,92,252,.1);color:var(--accent2);font-size:9px">'+p.label+'×'+p.slots+'</span>';
    });
    html+='<span style="font-size:9px;color:var(--text2)">('+recData.mece.reasoning+')</span>';
    html+='</div>';
  }

  if(confLevel==='high'){
    html+='<div style="font-size:11px;color:var(--accent3);margin-bottom:6px;padding:4px 10px;background:rgba(78,203,113,.08);border-radius:6px">⚡ 高置信度('+topConfidence+'%) — 点击卡片直接执行</div>';
  }else if(confLevel==='low'){
    html+='<div style="font-size:11px;color:var(--warn);margin-bottom:6px;padding:4px 10px;background:rgba(240,160,80,.08);border-radius:6px">🤔 低置信度('+topConfidence+'%) — 可点"AI深度推荐"让AI帮你选</div>';
  }

  html+='<div class="rec-cards">';

  if(recData&&recData.cards){
    recData.cards.forEach(function(c,i){
      var top=i===0?' top':'';

// ====== 流式响应处理 ======
async function streamToMsg(url,body,aiMsg){
  const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:abortController?abortController.signal:null});
  const reader=resp.body.getReader();const dec=new TextDecoder();
  let buf='',raw='',reasonMsg=null,finalMsg=null;

  while(true){
    const{done,value}=await reader.read();if(done)break;
    buf+=dec.decode(value,{stream:true});
    const lines=buf.split('\n');buf=lines.pop()||'';
    for(const line of lines){
      if(!line.startsWith('data:'))continue;
      try{const e=JSON.parse(line.slice(5).trim());if(!e?.type)continue;

        if(e.techniqueId==='deepthink-reasoning'){
          if(e.type==='STEP_START'){reasonMsg=addMsg('reason','');raw=''}
          if(e.type==='STEP_CONTENT'&&reasonMsg){raw+=e.content||'';reasonMsg.querySelector('.b').innerHTML=safeMarkdown(raw)}
          continue;
        }
        if(e.techniqueId==='deepthink-final'){
          if(e.type==='STEP_START'){finalMsg=addMsg('ai final','');raw=''}
          if(e.type==='STEP_CONTENT'&&finalMsg){raw+=e.content||'';finalMsg.querySelector('.b').innerHTML=safeMarkdown(raw)}
          continue;
        }
        if(e.type==='STEP_START'&&e.stepNumber===99){raw='';aiMsg.classList.add('refined')}
        else if(e.techniqueId==='refined'&&e.type==='STEP_CONTENT'&&e.content){raw+=e.content;aiMsg.querySelector('.b').innerHTML=safeMarkdown(raw)}
        else if(e.type==='STEP_START'){addMsg('sys','📌 '+(e.stepName||''))}
        else if(e.type==='STEP_CONTENT'&&e.content){raw+=e.content;aiMsg.querySelector('.b').innerHTML=safeMarkdown(raw)}

        scrollDown();
      }catch(ex){console.error('streamToMsg parse error:',ex)}
    }
  }
}

function finish(aiMsg){
  const b=aiMsg.querySelector('.b');

async function doExport(format,encodedContent){

  if(e.key==='ArrowDown'&&!e.target.value){e.preventDefault();var n=getNextInput();if(n!==null){e.target.value=n;autoResize(e.target)}return}

var batchQueue=[];

  var el=document.querySelector('.s-item[data-id="'+id+'"]');

    html+='<button onclick="autoQueueIntake(\''+JSON.stringify(data.suggestedTechniqueIds).replace(/'/g,"\\'")+'\')" style="margin-top:8px;padding:6px 16px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--accent3),#3a9f5c);color:#000;font-size:12px;font-weight:600;cursor:pointer">📋 自动加入队列并执行</button>';
    html+='</div>';
    var resultBubble=addMsg('ai','');resultBubble.querySelector('.b').innerHTML=html;
    scrollDown();
    document.getElementById('intakeResult').textContent='复杂度'+data.complexity+'/10 · 建议'+data.recommendedTechCount+'个技法 · 预估'+data.estimatedTokens+'tokens';
  }catch(e){
    addMsg('sys','<span style="color:#f05050">❌ 预分析失败: '+(e.message||'')+'</span>');
  }
}

function autoQueueIntake(idsJson){
  clearQueue();
  var ids=JSON.parse(idsJson);
  ids.forEach(function(id){
    // 从techNameMap获取名称
    var info=techNameMap[id];
    var name=info?info.name:id;
    toggleBatchQueue(id,name);
  });
  renderBatchBar();
  // 自动执行
  setTimeout(function(){executeBatch()},500);
}

/* ====== v2.3 新增功能 ====== */

// 停止生成
function stopGeneration(){if(abortController){abortController.abort();abortController=null}streaming=false;document.getElementById('sendBtn').disabled=false;document.getElementById('sendBtn').style.display='';document.getElementById('stopBtn').style.display='none';addMsg('sys','⏹ 已停止')}
function showStopBtn(){document.getElementById('sendBtn').style.display='none';document.getElementById('stopBtn').style.display=''}
function hideStopBtn(){document.getElementById('sendBtn').style.display='';document.getElementById('stopBtn').style.display='none'}

// 输入历史
function pushInput(t){if(!t||!t.trim())return;inputHistoryArr.unshift(t);if(inputHistoryArr.length>100)inputHistoryArr.pop();inputHistoryPos=-1}
function getPrevInput(){if(!inputHistoryArr.length)return null;if(inputHistoryPos<inputHistoryArr.length-1)inputHistoryPos++;return inputHistoryArr[inputHistoryPos]||null}
function getNextInput(){if(inputHistoryPos>0){inputHistoryPos--;return inputHistoryArr[inputHistoryPos]}inputHistoryPos=-1;return null}

// XSS防护
function safeMarkdown(text){if(!text)return'';try{return marked.parse(text,{sanitize:true})}catch(e){return text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}}

// 快捷指令
function handleQuickCmd(text){
  if(!text||!text.startsWith('/'))return false;
  var cmd=text.split(' ')[0].trim();
  var map={'/自由':['','💬 自由对话'],'/技法':['auto','🤖 智能推荐'],'/配方':['auto','📦 配方推荐'],'/深度':['auto','🧠 深度思考']};
  var act=map[cmd];
  if(!act)return false;
  if(cmd==='/深度'&&fastMode)toggleFast();
  mode=act[0];
  document.querySelectorAll('.s-item,.recipe-item').forEach(function(e){e.classList.remove('on')});
  if(act[0]==='auto'){var ae=document.querySelector('.recipe-item[data-id="auto"]');if(ae)ae.classList.add('on')}
  document.getElementById('statusTag').innerHTML=act[1];
  addMsg('sys',act[1]+'模式');
  document.getElementById('userInput').value='';document.getElementById('userInput').focus();
  return true;
}

// 追问
function maybeAskFollowup(bubble){
  var content=bubble.textContent.trim();
  if(!content||content.length<100||fastMode)return;
  var followups=[
    {q:'要不要我深入分析其中某个点？',cmd:'深入分析一下'},
    {q:'需要转化成具体行动计划吗？',cmd:'把这个方案转化成具体行动计划'},
    {q:'要不要用魔鬼审阅法挑漏洞？',cmd:'用魔鬼审阅法挑一下这个方案的漏洞'},
    {q:'需要导出成Word/PPT吗？点击底部的导出按钮即可',cmd:null}
  ];
  var f=followups[Math.floor(Math.random()*followups.length)];
  var div=document.createElement('div');
  div.style.cssText='margin-top:10px;padding:8px 12px;border-radius:8px;background:rgba(124,92,252,.06);border:1px dashed rgba(124,92,252,.2);font-size:11px;color:var(--text2);display:flex;align-items:center;gap:8px;flex-wrap:wrap';
  div.innerHTML='<span>💡 '+f.q+'</span>';
  if(f.cmd){var btn=document.createElement('button');btn.textContent='👉 '+f.cmd.substring(0,20);btn.style.cssText='padding:3px 10px;border-radius:12px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:10px;cursor:pointer;white-space:nowrap';btn.onclick=function(){document.getElementById('userInput').value=f.cmd;document.getElementById('userInput').focus();autoResize(document.getElementById('userInput'))};div.appendChild(btn)}
  bubble.appendChild(div);
}

// 反馈按钮
function addFeedbackBtns(bubble){
  var wrap=document.createElement('div');
  wrap.style.cssText='display:flex;gap:4px;margin-bottom:8px';
  wrap.innerHTML='<button onclick="sendFeedback(\'up\',this)" style="padding:2px 8px;font-size:14px;border:none;background:transparent;cursor:pointer" title="有帮助">👍</button><button onclick="sendFeedback(\'down\',this)" style="padding:2px 8px;font-size:14px;border:none;background:transparent;cursor:pointer" title="不够好">👎</button>';
  bubble.insertBefore(wrap,bubble.firstChild);
}
function sendFeedback(rating,btn){
  btn.parentElement.innerHTML='<span style="font-size:10px;color:var(--accent2)">'+(rating==='up'?'👍 感谢！':'👎 会改进')+'</span>';
  fetch('/api/agent/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sessionId:currentSessionId,rating:rating})}).catch(function(){});
}

// 流重试
async function streamWithRetry(url,body,aiMsg,retries){
  if(retries===undefined)retries=0;
  try{await streamToMsg(url,body,aiMsg)}catch(e){
    if(e.name==='AbortError')return;
    if(retries<3){await new Promise(function(r){setTimeout(r,Math.pow(2,retries)*1000)});if(aiMsg.querySelector('.b'))aiMsg.querySelector('.b').innerHTML='<div class="typing"><span></span><span></span><span></span></div>';return streamWithRetry(url,body,aiMsg,retries+1)}
    else{if(aiMsg.querySelector('.b'))aiMsg.querySelector('.b').innerHTML='<span style="color:#f05050">❌ 重试3次后仍失败</span>'}
  }
}

// 咨询模式: 深挖维度
async function consultingDeepDive(encodedQuestion,encodedDimension,btn){
  var question=decodeURIComponent(escape(atob(encodedQuestion)));
  var dimension=decodeURIComponent(escape(atob(encodedDimension)));
  btn.textContent='深挖中...';btn.disabled=true;
  var wrapper=document.createElement('div');
  wrapper.style.cssText='margin:8px 0;padding:10px 14px;border-radius:10px;background:rgba(240,160,80,.04);border:1px solid rgba(240,160,80,.15);border-left:3px solid var(--warn)';
  var b=document.createElement('div');b.className='b';
  b.innerHTML='<div style="font-size:12px;color:var(--warn);font-weight:600;margin-bottom:6px">🔬 深挖: '+dimension+'</div><div class="typing"><span></span><span></span><span></span></div>';
  wrapper.appendChild(b);
  btn.parentElement.after(wrapper);
  streaming=true;abortController=new AbortController();showStopBtn();
  try{
    await streamToMsg('/api/agent/consulting/deep-dive',{question:question,dimension:dimension},wrapper);
    wrapper.querySelector('.typing')?.remove();
  }catch(e){
    b.innerHTML='<span style="color:#f05050">❌ 深挖失败: '+(e.message||'未知错误')+'</span>';
  }
  streaming=false;abortController=null;
  document.getElementById('sendBtn').disabled=false;hideStopBtn();
  btn.textContent='🔍 深挖';btn.disabled=false;
}

// 对话导出Markdown
function exportChatMd(){
  var md='# 徐振伟智能体 · 对话记录\n\n> '+new Date().toLocaleString('zh-CN')+'\n\n---\n\n';
  document.getElementById('chat').querySelectorAll('.msg').forEach(function(m){
    var role='系统',content=m.querySelector('.b')?.textContent?.trim();
    if(!content||content==='[空]')return;
    if(m.classList.contains('user'))role='🧑 用户';
    else if(m.classList.contains('ai')||m.classList.contains('reason'))role='🤖 徐振伟';
    md+='### '+role+'\n\n'+content+'\n\n---\n\n';
  });
  var blob=new Blob([md],{type:'text/markdown'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='对话_'+new Date().toISOString().slice(0,10)+'.md';a.click();URL.revokeObjectURL(a.href);
  addMsg('sys','📥 对话已导出为 Markdown');
}

function safeInit(fn){
  if(_initDone)return;_initDone=true;fn();
}

updateSendBtn();
