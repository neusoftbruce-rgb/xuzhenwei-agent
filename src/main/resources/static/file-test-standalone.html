<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文件上传测试 - 独立版</title>
<style>
body{font-family:'Microsoft YaHei',sans-serif;padding:40px;background:#0f0f1a;color:#cdcde6}
h2{color:#7c5cfc}
.row{display:flex;gap:12px;align-items:center;margin:16px 0}
label.btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:20px;
  border:1px solid rgba(124,92,252,.4);color:#7c5cfc;
  font-size:14px;cursor:pointer;
  transition:all .2s;
}
label.btn:hover{background:rgba(124,92,252,.1)}
label.btn input{display:none}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.tag{padding:4px 10px;border-radius:6px;background:rgba(124,92,252,.12);border:1px solid rgba(124,92,252,.3);font-size:12px;color:#5b8def}
</style>
</head>
<body>

<h2>📁📂 文件选择测试</h2>

<div class="row">
  <label class="btn">
    <span>📁</span> 选择文件
    <input type="file" multiple onchange="addFiles(this)">
  </label>

  <label class="btn">
    <span>📂</span> 选择文件夹
    <input type="file" webkitdirectory multiple onchange="addFiles(this)">
  </label>
</div>

<div id="tags" class="tags"></div>

<script>
var allFiles=[];
function addFiles(input){
  var files=Array.from(input.files);
  files.forEach(function(f){allFiles.push(f)});
  show();
}
function show(){
  document.getElementById('tags').innerHTML=allFiles.map(function(f,i){
    return '<span class="tag">📄 '+f.name+' <small>('+(f.size/1024).toFixed(1)+'KB)</small></span>';
  }).join('');
}
</script>

</body>
</html>
